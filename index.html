<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  @supports (height: 100dvh) { html, body { height: 100dvh; } }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }

  #ui { color: #fff; margin-bottom: 8px; font-size: 13px; opacity: 0.7; }

  /* ── タッチ操作 ── */
  #touchControls { display: none; }
  @media (pointer: coarse) {
    #touchControls.tc-active { display: block; }
  }
  .touch-btn {
    position: fixed; user-select: none; touch-action: none;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%; color: #fff; font-size: 22px; font-weight: bold;
    width: 60px; height: 60px;
  }
  .touch-btn.active { background: rgba(255,255,255,0.35); }
  #btnKick   { right: 16px;  bottom: calc(16px + env(safe-area-inset-bottom, 0px)); width: 70px; height: 70px; font-size: 18px; }
  #btnOver   { right: 96px; bottom: calc(16px + env(safe-area-inset-bottom, 0px)); width: 70px; height: 70px; font-size: 13px; }
  #btnSpecial { right: 16px; bottom: calc(96px + env(safe-area-inset-bottom, 0px)); width: 70px; height: 70px; font-size: 13px; background: rgba(255,120,0,0.4); border-color: rgba(255,180,0,0.7); }
  #btnSpecial.ready { display: flex !important; animation: specialPulse 0.8s infinite alternate; }
  @keyframes specialPulse { from { box-shadow: 0 0 8px #f80; } to { box-shadow: 0 0 24px #ff0, 0 0 48px #f80; } }
  /* バーチャルジョイスティック */
  #joyZone { position: fixed; left: 0; bottom: env(safe-area-inset-bottom, 0px); width: 45%; height: 55%; touch-action: none; z-index: 5; }
  #joyBase {
    position: fixed; width: 130px; height: 130px; margin: -65px 0 0 -65px;
    border-radius: 50%; background: rgba(255,255,255,0.10);
    border: 2px solid rgba(255,255,255,0.30); display: none;
    pointer-events: none; touch-action: none; z-index: 6;
  }
  #joyKnob {
    position: fixed; width: 60px; height: 60px; margin: -30px 0 0 -30px;
    border-radius: 50%; background: rgba(255,255,255,0.30);
    border: 2px solid rgba(255,255,255,0.50); display: none;
    pointer-events: none; touch-action: none; z-index: 7;
  }

  @media (pointer: coarse) {
    #ui { display: none; }
    body { justify-content: center; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }
    #gameCanvas { max-width: 100vw; max-height: 55dvh; width: auto; height: auto; aspect-ratio: 800 / 480; }
  }
  #startScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;

    align-items: center; justify-content: center; color: #fff;
  }

    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.45);

  #startScreen > * { position: relative; z-index: 1; }

  #backBtn { margin-top: 8px; padding: 6px 20px; background: #555; color: #fff; border: none; border-radius: 6px; cursor: pointer; }

  /* ── ガチャ ── */
  #gachaScreen, #collectionScreen, #difficultyScreen, #characterSelectScreen {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,5,0.9);

  .gacha-title { font-size: 28px; color: #ff0; text-shadow: 0 0 12px #f80, 0 0 24px #f60; }

  .gacha-machine { position: relative; width: clamp(170px, 50vw, 240px); aspect-ratio: 220 / 300; }
  .gacha-lid {
    position: absolute; top: 0; left: 8%; width: 84%; height: 9%;

  .gacha-dome {
    position: absolute; top: 8%; left: 4%; width: 92%; height: 46%;
    background: rgba(190,225,255,0.22);
    border: 5px solid #e74c3c;
    border-radius: 50% 50% 16px 16px / 38% 38% 16px 16px;
    overflow: hidden;
  }
  .gacha-capsule {
    position: absolute; width: 13%; height: 13%; border-radius: 50%;
    background: linear-gradient(to bottom, #fff 50%, var(--c) 50%);
    border: 1px solid rgba(0,0,0,0.25);
    transition: transform 0.12s;
  }
  .gacha-capsule.shake { animation: gachaShake 0.15s infinite; }
  @keyframes gachaShake {
    0%, 100% { transform: translate(0, 0); }
    25%  { transform: translate(-3px, 2px) rotate(-8deg); }
    50%  { transform: translate(3px, -3px) rotate(8deg); }
    75%  { transform: translate(-2px, 3px) rotate(-4deg); }

  .gacha-body {

  .gacha-slot {
    position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
    width: 36%; height: 9%; background: #7a1f12; border-radius: 4px;
  }
  .gacha-handle {
    position: absolute; top: 30%; left: 50%; transform: translateX(-50%) rotate(0deg);

    border: 5px solid #ccc;
    transition: transform 1s cubic-bezier(.5, 1.8, .4, 1);
  }
  .gacha-handle::after {
    content: ''; position: absolute; top: 50%; left: 50%; width: 70%; height: 14%;
    background: #999; border-radius: 4px; transform: translate(-50%, -50%);
  }
  .gacha-handle.spin { transform: translateX(-50%) rotate(360deg); }
  .gacha-exit {
    position: absolute; bottom: 6%; left: 8%; width: 34%; height: 26%;

  .gacha-output { position: relative; width: 80px; height: 80px; overflow: visible; }
  .gacha-output-capsule {
    position: absolute; left: 50%; top: -140px;
    width: 50px; height: 50px; border-radius: 50%;

  .gacha-output-capsule.drop { top: 0; opacity: 1; }
  .gacha-output-capsule.zoom { transform: translateX(-50%) translateY(-70px) scale(5); }

  .gacha-output-img {
    position: absolute; left: 50%; top: -140px;

  .gacha-output-img.drop { top: 0; opacity: 1; }
  .gacha-output-img.zoom { transform: translateX(-50%) translateY(-70px) scale(3); }

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const specialCutInImg = new Image();
specialCutInImg.src = 'assets/a9585e7b-d350-4aac-8376-a84e300da2ff.png';
const playerSpecialImg = new Image();
playerSpecialImg.src = 'assets/cdb56d1d-62ff-4854-8267-4b1d7c035c6a.png';
const cpuSpecialImg = new Image();
cpuSpecialImg.src = 'assets/d3d1081b-19d0-4dc1-b932-4ced9702dd71.png';

// ── サウンド ──────────────────────────────────────
let audioCtx = null;
function playAttackSound() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.18);
}

// ── 試合終了ファンファーレ / ガチャワクワク音 / タイトルボイス ──
function playSynthesizedSound(type) {
  if (type === 'title_voice') {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const uttr = new SpeechSynthesisUtterance();
      uttr.text = 'Seh, Pah, Tah, Kuh, Roh, Sepatakuro!';
      uttr.lang = 'en-US';
      uttr.pitch = 1.4;
      uttr.rate = 0.8;
      window.speechSynthesis.speak(uttr);
    }
    return;
  }

  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (type === 'win') {
    const notes = [261.63, 329.63, 392.00, 523.25];
    notes.forEach((freq, index) => {
      setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      }, index * 150);
    });
  } else if (type === 'gacha') {
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600 + (i * 120), audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      }, i * 60);
    }
  }
}


// ── 定数 ──────────────────────────────────────────
const GRAVITY = 0.45;
const PLAYER_GRAVITY = 0.97; // プレイヤー専用の重力（初速とセットで到達高さを維持しつつキビキビに）
const SPEED_SCALE = 0.2; // 全体のゲームスピード（1 = 通常、0.2 = 5倍ゆっくり）
// ボールの物理更新を1フレーム内で複数回実行し、軌道・重力の比率を保ったまま
// 見た目のスピードだけを3倍にする（BALL_SUBSTEPS × BALL_STEP_SCALE = SPEED_SCALE * 3）
const BALL_SUBSTEPS = 4;
const BALL_STEP_SCALE = SPEED_SCALE * 0.75;
const GROUND = H - 60;
const NET_X = W / 2;
const NET_H = 100;
const NET_TOP = GROUND - NET_H;
const PLAYER_W = 28, PLAYER_H = 52;
const BALL_R = 14;
const WIN_SCORE = 5;
const KICK_HOLD_FRAMES = 12; // 振り上げた足を下ろさずに保持する追加フレーム数（約0.2秒）

// ── Firebase設定 ──────────────────────────────────
// ★ 自分のFirebaseプロジェクトの設定値に書き換えてください
// (Firebaseコンソール → プロジェクトの設定 → 全般 → マイアプリ → SDKの構成)
const firebaseConfig = {
  apiKey: "AIzaSyCEqJiiOeqJvsXacsUlxybGg0zrXpM6Hfg",
  authDomain: "sepak-game.firebaseapp.com",

  projectId: "sepak-game",
  storageBucket: "sepak-game.firebasestorage.app",
  messagingSenderId: "556598796613",
  appId: "1:556598796613:web:7057bae47a4af72fb95e2c",
  measurementId: "G-7VQ87H3LGP"
};
let db = null;

function pickCapsule() {
  const total = CAPSULE_TYPES.reduce((sum, t) => sum + t.weight, 0);
  let r = Math.random() * total;
  for (const t of CAPSULE_TYPES) {
    if (r < t.weight) return t;
    r -= t.weight;
  }
  return CAPSULE_TYPES[CAPSULE_TYPES.length - 1];
}

let currentUser = null;

function mergeCollections(a, b) {
  const merged = Object.assign({}, a);
  for (const id in b) {
    merged[id] = Math.max(merged[id] || 0, b[id] || 0);
  }
  return merged;
}

function updateLoginUI() {
  const btn = document.getElementById('googleLoginBtn');
  const status = document.getElementById('loginStatus');
  if (currentUser) {
    btn.textContent = 'ログアウト';
    status.textContent = (currentUser.displayName || 'ユーザー') + ' でログイン中';
  } else {
    btn.textContent = 'Googleでログイン';
    status.textContent = '';
  }
}

  auth.onAuthStateChanged(user => {
    currentUser = user;
    updateLoginUI();
    if (user && db) {
      db.ref('users/' + user.uid + '/collection').get().then(snap => {
        const cloud = snap.val() || {};
        const merged = mergeCollections(loadCollection(), cloud);
        saveCollection(merged);
        if (document.getElementById('collectionScreen').style.display !== 'none') {
          renderCollection();
        }
      }).catch(e => console.warn('コレクション読み込み失敗', e));

}

function bindTouchButton(id, ...codes) {
  const el = document.getElementById(id);
  const press = e => { e.preventDefault(); codes.forEach(c => keys[c] = true); el.classList.add('active'); };
  const release = e => { e.preventDefault(); codes.forEach(c => keys[c] = false); el.classList.remove('active'); };
  el.addEventListener('touchstart', press, { passive: false });
  el.addEventListener('touchend', release, { passive: false });
  el.addEventListener('touchcancel', release, { passive: false });
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
}

// ── バーチャルジョイスティック ──
(function () {
  const zone = document.getElementById('joyZone');
  const base = document.getElementById('joyBase');
  const knob = document.getElementById('joyKnob');
  const RADIUS = 55;   // ノブの可動半径
  const DEAD = 16;     // デッドゾーン
  let joyId = null;    // 追跡中のタッチ識別子
  let ox = 0, oy = 0;  // スティック中心

  function clearKeys() {
    keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
    keys['ArrowDown'] = false; keys['Space'] = false;
  }
  function setKnob(x, y) { knob.style.left = x + 'px'; knob.style.top = y + 'px'; }

  function update(tx, ty) {
    let dx = tx - ox, dy = ty - oy;
    const dist = Math.hypot(dx, dy);
    if (dist > RADIUS) { dx = dx / dist * RADIUS; dy = dy / dist * RADIUS; }
    setKnob(ox + dx, oy + dy);
    clearKeys();
    if (dx < -DEAD) keys['ArrowLeft'] = true;
    else if (dx > DEAD) keys['ArrowRight'] = true;
    if (dy < -DEAD) keys['Space'] = true;       // 上＝ジャンプ
    else if (dy > DEAD) keys['ArrowDown'] = true; // 下
  }

  function start(e) {
    if (joyId !== null) return;
    const t = e.changedTouches[0];
    joyId = t.identifier;
    ox = t.clientX; oy = t.clientY;
    base.style.left = ox + 'px'; base.style.top = oy + 'px';
    base.style.display = 'block'; knob.style.display = 'block';
    setKnob(ox, oy);
    e.preventDefault();
  }
  function findTouch(e) {
    for (const t of e.changedTouches) if (t.identifier === joyId) return t;
    return null;
  }
  function move(e) {
    if (joyId === null) return;
    const t = findTouch(e);
    if (!t) return;
    update(t.clientX, t.clientY);
    e.preventDefault();
  }
  function end(e) {
    if (joyId === null) return;
    if (!findTouch(e)) return;
    joyId = null;
    base.style.display = 'none'; knob.style.display = 'none';
    clearKeys();
    e.preventDefault();
  }
  zone.addEventListener('touchstart', start, { passive: false });
  zone.addEventListener('touchmove', move, { passive: false });
  zone.addEventListener('touchend', end, { passive: false });
  zone.addEventListener('touchcancel', end, { passive: false });
})();

// ── CPU AI ────────────────────────────────────────
function cpuAI() {
  if (gameState !== 'play') return;
  if (cpu.specialGauge >= cpuSpecialCost && !specialCutInActive) {
    doSpecial(cpu);
    return;
  }
  const spd = cpuMoveSpeed;

  // 自陣側に来たボールを常に追いかける
  const minX = NET_X + 10;
  const maxX = W - 10;
  const targetX = Math.max(minX, Math.min(maxX, ball.x));

  if (cpu.x < targetX - 5) cpu.vx = spd;
  else if (cpu.x > targetX + 5) cpu.vx = -spd;
  else cpu.vx = 0;

  // ジャンプ判断（ネット付近、もしくは遠くてもボールが高い位置のときに早めに跳ぶ）
  const nearNet = cpu.x < NET_X + 160;
  const ballHigh = ball.y < GROUND - 70;
  const canAttack = nearNet || ballHigh;
  if (ball.x > NET_X - 30 && canAttack && cpu.onGround) {
    if (Math.abs(cpu.x - ball.x) < cpuDiff.atkRange) {
      cpu.vy = cpuDiff.jumpPower;
      cpu.onGround = false;
      cpu.attackRoll = Math.random();
    }
  }

  // キック判断（範囲を広めに）
  if (cpu.kickCooldown <= 0) {
    const dx = Math.abs(cpu.x - ball.x);
    const dy = Math.abs(cpu.y - ball.y);
    // オーバーヘッドアタックはネット付近のとき、難易度に応じた確率でのみ実行
    // （アマチュアはネットから遠い時にもまれにアタックしてしまい、ミスにつながる）
    const farAttack = !nearNet && cpu.attackRoll < cpuFarAttackChance;
    if (!cpu.onGround && dy < 60 && dx < 70 && ((nearNet && cpu.attackRoll < cpuAttackChance) || farAttack)) {
      doOverhead(cpu);
    } else if (dx < 65 && dy < 65) {
      doKick(cpu);
    }
  }
}

// ── キック処理 ────────────────────────────────────
function doKick(ent) {
  if (ent.kickCooldown > 0) return;
  if (ent.isPlayer && ball.x > NET_X) return;
  if (!ent.isPlayer && ball.x < NET_X) return;
  const dx = ball.x - ent.x;
  const dy = ball.y - ent.y;
  const hitW = fireballActive ? 15 : 60;
  const hitH = fireballActive ? 20 : 80;
  if (Math.abs(dx) < hitW && Math.abs(dy) < hitH) {
    const spd = (ent.isPlayer ? 13 : 11 * cpuDiff.kickMult) * 1.3;
    const dir = Math.abs(dx) < 5 ? ent.facing : (dx > 0 ? 1 : -1);
    ball.vx = dir * spd * 0.7 + (ent.isPlayer ? 0.5 : -0.5);
    ball.vy = -spd * 0.85;
    ball.spin = dir > 0 ? 6 : -6;
    ent.kickCooldown = 20;
    ent.kickEffect = 10 + KICK_HOLD_FRAMES;
    fireballActive = false;
    addEffect(ball.x, ball.y, '#ff0', 'kick');
    playAttackSound();
  }
}

function doOverhead(ent) {
  if (ent.kickCooldown > 0) return;
  if (ent.isPlayer && ball.x > NET_X) return;
  if (!ent.isPlayer && ball.x < NET_X) return;
  const dx = ball.x - ent.x;
  const dy = ball.y - ent.y;
  const hitW = fireballActive ? 25 : 70;
  const hitH = fireballActive ? 30 : 80;
  if (Math.abs(dx) < hitW && Math.abs(dy) < hitH) {
    const atkSpd = ent.isPlayer ? 14 : 14 * cpuDiff.kickMult;
    ball.vx = (ent.isPlayer ? 1 : -1) * atkSpd * 1.3;
    ball.vy = 6 * 1.3;
    ball.spin = ent.isPlayer ? -8 : 8;
    ent.kickCooldown = 25;
    ent.overheadState = 2;
    ent.overheadTimer = 24 + KICK_HOLD_FRAMES;
    ent.kickEffect = 14 + KICK_HOLD_FRAMES;
    const maxGauge = ent.isPlayer ? PLAYER_SPECIAL_COST : cpuSpecialCost;
    ent.specialGauge = Math.min(maxGauge, ent.specialGauge + 1);
    if (ent.isPlayer && ent.specialGauge >= PLAYER_SPECIAL_COST) {
      document.getElementById('btnSpecial').classList.add('ready');
    }
    fireballActive = false;
    addEffect(ball.x, ball.y, '#f0f', 'overhead');
    playAttackSound();
  }
}

function doSpecial(ent) {
  const isOnline = (mode === 'host' || mode === 'guest');
  const cost = (ent.isPlayer || isOnline) ? PLAYER_SPECIAL_COST : cpuSpecialCost;
  if (ent.specialGauge < cost) return;
  if (specialCutInActive) return;
  ent.specialGauge = 0;
  if (ent.isPlayer) document.getElementById('btnSpecial').classList.remove('ready');
  specialCutInActive = true;
  specialCutInTimer = 90;
  specialCutInEntity = ent;
}

function executeSpecialAttack(ent) {
  const dir = ent.isPlayer ? 1 : -1;
  ball.vx = dir * 28 * 1.3;
  ball.vy = 3 * 1.3;
  ball.spin = dir * -15;
  fireballActive = true;
  ent.overheadState = 2;
  ent.overheadTimer = 60;
  ent.kickEffect = 40;
  ent.kickCooldown = 70;
  addEffect(ball.x, ball.y, '#ff4400', 'overhead');
}

// ── エフェクト ────────────────────────────────────
function addEffect(x, y, color, type) {
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 / 10) * i;
    effects.push({
      x, y,
      vx: Math.cos(angle) * (type === 'overhead' ? 4 : 3),
      vy: Math.sin(angle) * (type === 'overhead' ? 4 : 3),
      life: 18, maxLife: 18,
      color, r: type === 'overhead' ? 5 : 4,
    });
  }
}

// ── 物理 ──────────────────────────────────────────
function updateBall(authoritative) {
  ball.vy += GRAVITY * BALL_STEP_SCALE;
  ball.spin *= 0.97;
  ball.vx *= 0.995;

  // トレイル
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 12) ball.trail.shift();

  ball.x += ball.vx * BALL_STEP_SCALE;
  ball.y += ball.vy * BALL_STEP_SCALE;

  // 地面
  if (ball.y + BALL_R >= GROUND) {
    ball.y = GROUND - BALL_R;
    ball.vy *= -0.55;
    ball.vx *= 0.85;
    ball.spin *= 0.7;
    if (Math.abs(ball.vy) < 1.5) ball.vy = 0;
  }

  // 壁
  if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx) * 0.8; }
  if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx) * 0.8; }

  // ネット
  const netLeft  = NET_X - 4;
  const netRight = NET_X + 4;
  if (ball.x + BALL_R > netLeft && ball.x - BALL_R < netRight && ball.y + BALL_R > NET_TOP) {
    if (ball.vx > 0 && ball.x < NET_X) { ball.x = netLeft - BALL_R; ball.vx *= -0.6; }
    else if (ball.vx < 0 && ball.x > NET_X) { ball.x = netRight + BALL_R; ball.vx *= -0.6; }
    else { ball.vy *= -0.6; ball.y = NET_TOP - BALL_R; }
  }

  // 得点判定（ホスト/シングルプレイのみ判定する）
  if (authoritative && ball.y + BALL_R >= GROUND && gameState === 'play') {
    fireballActive = false;
    if (ball.x < NET_X) {
      score.cpu++;
      showPoint('CPUの得点！', score.cpu >= WIN_SCORE ? 'gameover' : 'point');
    } else {
      score.p++;
      showPoint('プレイヤーの得点！', score.p >= WIN_SCORE ? 'gameover' : 'point');
    }
  }
}

// ボールの物理更新を1フレーム内でBALL_SUBSTEPS回連続実行する
function updateBallSubsteps(authoritative) {
  for (let i = 0; i < BALL_SUBSTEPS; i++) {
    updateBall(authoritative);
    if (authoritative && gameState !== 'play') break;
  }
}

function updatePlayer(ent, input) {
  // 横移動
  ent.vy += PLAYER_GRAVITY * SPEED_SCALE;

  if (input) {
    if (input.left)  { ent.vx = -13.5 * 1.3; ent.facing = -1; }
    else if (input.right) { ent.vx = 13.5 * 1.3; ent.facing = 1; }
    else ent.vx *= 0.7;

    // ジャンプ（2回まで連続ジャンプ可能）
    if (input.jump && !ent.prevJump) {
      if (ent.onGround) {
        ent.vy = -12.9 * 1.3; ent.onGround = false; ent.jumpCount = 1;
      } else if (ent.jumpCount < 2) {
        ent.vy = -12.9 * 1.3; ent.jumpCount = 2;
      }
    }
    ent.prevJump = input.jump;

    if (input.down && !ent.onGround) {
      ent.vy = 18 * 1.3; // 急降下（上昇中でも即下降）
    }
    if (input.kick && ent.kickCooldown <= 0) doKick(ent);
    if (input.overhead && ent.kickCooldown <= 0) doOverhead(ent);
    if (input.special) doSpecial(ent);
  } else {
    cpuAI();
  }

  // 壁制限
  const half = ent.isPlayer ? NET_X - 10 : W;
  const leftWall = ent.isPlayer ? 10 : NET_X + 10;

  ent.x += ent.vx * SPEED_SCALE;
  ent.y += ent.vy * SPEED_SCALE;

  if (ent.x < leftWall) { ent.x = leftWall; ent.vx = 0; }
  if (ent.x > half) { ent.x = half; ent.vx = 0; }

  if (ent.y >= GROUND) {
    ent.y = GROUND; ent.vy = 0; ent.onGround = true;
    ent.overheadState = 0; ent.jumpCount = 0;
  }

  if (ent.kickCooldown > 0) ent.kickCooldown--;
  if (ent.kickEffect > 0) ent.kickEffect--;
  if (ent.overheadTimer > 0) { ent.overheadTimer--; if (ent.overheadTimer === 0) ent.overheadState = 0; }
  ent.limbAnim += (ent.onGround ? Math.abs(ent.vx) * 0.15 : 0.08) * SPEED_SCALE;
}

// ── 得点イベント ───────────────────────────────────
function showPoint(msg, next) {
  pointMsg = msg;
  pointTimer = next === 'gameover' ? 180 : 90;
  gameState = next === 'gameover' ? 'gameover' : 'point';
  if (next === 'gameover') {
    playSynthesizedSound('win');
    // プレイログ書き込み（終了）
    if (db && currentGameLogKey) {
      const winner = score.p > score.cpu ? 'player' : 'cpu';
      const durationSec = currentGameStartTime ? Math.round((Date.now() - currentGameStartTime) / 1000) : null;
      db.ref('play_logs/' + currentGameLogKey).update({
        endedAt: new Date().toISOString(),
        scorePlayer: score.p,
        scoreCpu: score.cpu,
        winner: winner,
        durationSec: durationSec,
        result: 'finished',
      });
      currentGameLogKey = null;
    }
  }
}

function resetAfterPoint() {
  serveSide = -serveSide;
  player.x = W * 0.25; player.y = GROUND; player.vx = 0; player.vy = 0; player.onGround = true;
  cpu.x = W * 0.75; cpu.y = GROUND; cpu.vx = 0; cpu.vy = 0; cpu.onGround = true;
  ball.x = serveSide === 1 ? W / 4 : W * 3 / 4; ball.y = GROUND - 240;
  ball.vx = 2 * serveSide; ball.vy = -4; ball.spin = 0; ball.trail = [];
  effects = [];
  gameState = 'play';
}

// ── 描画：背景 ────────────────────────────────────
function drawBackground() {
  // 体育館の壁面（上部ほど明るいグラデーション）
  const wall = ctx.createLinearGradient(0, 0, 0, GROUND);
  wall.addColorStop(0, '#dfe6ee');
  wall.addColorStop(0.55, '#b7c3d4');
  wall.addColorStop(1, '#8c9cb4');
  ctx.fillStyle = wall;
  ctx.fillRect(0, 0, W, H);

  // 天井のライト（照明）
  for (let i = 0; i < 4; i++) {
    const lx = 100 + i * 200;
    const glow = ctx.createRadialGradient(lx, 6, 0, lx, 6, 110);
    glow.addColorStop(0, 'rgba(255,255,240,0.55)');
    glow.addColorStop(1, 'rgba(255,255,240,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fffdf2';
    ctx.fillRect(lx - 32, 4, 64, 8);
  }

  // 高窓（採光窓）
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  for (let i = 0; i < 6; i++) {
    ctx.fillRect(40 + i * 130, 60, 90, 36);
  }

  // 観客席（観客席シルエット）
  const standsTop = GROUND - 90;
  const standsH = 90;
  ctx.fillStyle = '#5a6a82';
  ctx.fillRect(0, standsTop, W, standsH);
  // ベンチの段差ライン
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for (let row = 0; row < 5; row++) {
    const ry = standsTop + 6 + row * (standsH - 6) / 5;
    ctx.beginPath(); ctx.moveTo(0, ry); ctx.lineTo(W, ry); ctx.stroke();
  }
  // 観客（簡易シルエット）
  for (let i = 0; i < 60; i++) {
    const px = (i * 41) % W;
    const row = i % 5;
    const py = standsTop + 10 + row * (standsH - 6) / 5;
    const tone = 60 + ((i * 7) % 5) * 30;
    ctx.fillStyle = `rgba(${tone},${tone + 10},${tone + 30},0.6)`;
    ctx.beginPath(); ctx.arc(px + 6, py, 5, 0, Math.PI * 2); ctx.fill();
  }

  // コートの地面（緑のコートサーフェス。ネット側から手前にかけて暗くなるグラデーションで立体感を表現）
  const floorTop = GROUND - 6;
  const grd = ctx.createLinearGradient(0, floorTop, 0, H);
  grd.addColorStop(0, '#3f9a4e');
  grd.addColorStop(1, '#1c4424');
  ctx.fillStyle = grd;
  ctx.fillRect(0, floorTop, W, H - floorTop);

  // 床の質感（うっすらとしたグリッド線でマット/体育館フロアっぽい質感を出す）
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let gy = floorTop + 6; gy < H; gy += 6) {
    ctx.beginPath(); ctx.moveTo(0, gy + 0.5); ctx.lineTo(W, gy + 0.5); ctx.stroke();
  }
  for (let gx = 0; gx < W; gx += 40) {
    ctx.beginPath(); ctx.moveTo(gx + 0.5, floorTop); ctx.lineTo(gx + 0.5, H); ctx.stroke();
  }
  ctx.restore();

  // コート外周ライン（うっすらとした白線）
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 2;
  ctx.strokeRect(14, floorTop + 2, W - 28, H - (floorTop + 2) - 6);

  // センターライン（ネット下の境界線）
  ctx.beginPath();
  ctx.moveTo(NET_X, floorTop + 2);
  ctx.lineTo(NET_X, H - 6);
  ctx.stroke();

  // クォーターサークル（ネット根元、左右に扇形のライン）
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1.5;
  const quarterR = 36;
  ctx.beginPath(); ctx.arc(NET_X, floorTop + 2, quarterR, 0, Math.PI / 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(NET_X, floorTop + 2, quarterR, Math.PI / 2, Math.PI); ctx.stroke();

  // サービスサークル（各コート中央付近の小円。ネット寄りに配置）
  [NET_X - 130, NET_X + 130].forEach(cx => {
    ctx.beginPath(); ctx.arc(cx, floorTop + 18, 13, 0, Math.PI * 2); ctx.stroke();
  });

  // コートライト（照明雰囲気）
  [[160, GROUND - 5], [640, GROUND - 5]].forEach(([lx, ly]) => {
    const glow = ctx.createRadialGradient(lx, ly, 0, lx, ly, 180);
    glow.addColorStop(0, 'rgba(200,230,255,0.1)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
  });
}

// ── 描画：ネット ──────────────────────────────────
function drawNet() {
  ctx.save();

  // ネット本体（メッシュ）
  const meshW = 5;
  ctx.fillStyle = 'rgba(20,30,50,0.25)';
  ctx.fillRect(NET_X - meshW, NET_TOP - 8, meshW * 2, NET_H + 8);

  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1;
  const cols = 8;
  for (let i = 0; i <= cols; i++) {
    const nx = NET_X - meshW + (meshW * 2 / cols) * i;
    ctx.beginPath(); ctx.moveTo(nx, NET_TOP); ctx.lineTo(nx, GROUND); ctx.stroke();
  }
  const rows = 14;
  for (let j = 0; j <= rows; j++) {
    const ny = NET_TOP + (NET_H / rows) * j;
    ctx.beginPath(); ctx.moveTo(NET_X - meshW, ny); ctx.lineTo(NET_X + meshW, ny); ctx.stroke();
  }

  // 上部テープ
  ctx.fillStyle = '#fff';
  ctx.fillRect(NET_X - meshW - 1, NET_TOP - 6, meshW * 2 + 2, 6);

  // ポール（左右に伸びるバー、テープより上に出す）
  ctx.fillStyle = '#d8d8d8';
  ctx.fillRect(NET_X - 3, NET_TOP - 22, 6, NET_H + 22);
  ctx.fillStyle = '#ff5050';
  ctx.fillRect(NET_X - 3, NET_TOP - 22, 6, 6);

  ctx.restore();
}

// ── 描画：プレイヤー ──────────────────────────────
// パーツ画像生成（オフスクリーンCanvasに高品質パーツを描画してキャッシュ）
function generatePartCanvas(w, h, drawFn) {
  const c = document.createElement('canvas');
  c.width = Math.ceil(w * 4); c.height = Math.ceil(h * 4);
  const pc = c.getContext('2d');
  pc.scale(4, 4);
  drawFn(pc, w, h);
  return c;
}

function generatePlayerParts(isPlayer) {
  const jersey     = isPlayer ? '#2a7aee' : '#e0451f';
  const jerseyDark = isPlayer ? '#1a5aaa' : '#a8330f';
  const jerseyLight= isPlayer ? '#5a9af4' : '#f47040';
  const shorts     = isPlayer ? '#16306b' : '#5e1c08';
  const shortsDark = isPlayer ? '#0e2050' : '#401005';
  const skin       = '#f4c49a';
  const skinDark   = '#d4a478';
  const hair       = isPlayer ? '#3a2a1a' : '#241712';
  const sock       = '#ffffff';
  const sockBand   = isPlayer ? '#1a5aaa' : '#a8330f';
  const shoe       = '#202020';
  const parts = {};

  // 頭パーツ (24x26 center at 12,14)
  parts.head = generatePartCanvas(24, 26, (pc, w, h) => {
    const cx = 12, cy = 14, r = 10;
    // 髪（後ろ）
    pc.fillStyle = hair;
    pc.beginPath(); pc.ellipse(cx, cy - 2, r + 1.5, r * 0.95, 0, Math.PI, Math.PI * 2); pc.fill();
    pc.fillRect(cx - r - 1.5, cy - 4, (r + 1.5) * 2, 5);
    // 顔
    const faceGrad = pc.createRadialGradient(cx - 1, cy - 2, 0, cx, cy, r * 1.1);
    faceGrad.addColorStop(0, '#ffe0c0'); faceGrad.addColorStop(1, skin);
    pc.fillStyle = faceGrad;
    pc.beginPath(); pc.ellipse(cx, cy, r, r * 1.1, 0, 0, Math.PI * 2); pc.fill();
    // 頬のハイライト
    pc.fillStyle = 'rgba(255,200,180,0.4)';
    pc.beginPath(); pc.arc(cx + 5, cy + 2, 3.5, 0, Math.PI * 2); pc.fill();
    // サイド髪
    pc.fillStyle = hair;
    pc.fillRect(cx - r - 1.5, cy - 4, 3, 8);
    pc.fillRect(cx + r - 1.5, cy - 4, 3, 8);
    // 白目
    pc.fillStyle = '#fff';
    pc.beginPath(); pc.ellipse(cx + 4, cy - 1, 3.5, 3, 0, 0, Math.PI * 2); pc.fill();
    // 虹彩
    pc.fillStyle = '#4a3520';
    pc.beginPath(); pc.arc(cx + 5, cy - 0.5, 2.2, 0, Math.PI * 2); pc.fill();
    // 瞳孔
    pc.fillStyle = '#1a1a1a';
    pc.beginPath(); pc.arc(cx + 5, cy - 0.5, 1.1, 0, Math.PI * 2); pc.fill();
    // ハイライト
    pc.fillStyle = '#fff';
    pc.beginPath(); pc.arc(cx + 6, cy - 1.8, 0.9, 0, Math.PI * 2); pc.fill();
    // 眉（太く力強く）
    pc.strokeStyle = hair; pc.lineWidth = 2; pc.lineCap = 'round';
    pc.beginPath(); pc.moveTo(cx + 1, cy - 5); pc.lineTo(cx + 8, cy - 5.5); pc.stroke();
    // 口
    pc.strokeStyle = '#c07060'; pc.lineWidth = 1.2; pc.lineCap = 'round';
    pc.beginPath(); pc.arc(cx + 4, cy + 4.5, 2.5, 0.1, Math.PI - 0.1); pc.stroke();
    // 耳
    pc.fillStyle = skin;
    pc.beginPath(); pc.ellipse(cx - r + 0.5, cy, 2.5, 3.5, 0, 0, Math.PI * 2); pc.fill();
    pc.strokeStyle = skinDark; pc.lineWidth = 0.6;
    pc.beginPath(); pc.arc(cx - r + 1, cy, 1.8, -0.5, 1.5); pc.stroke();
  });

  // 胴体パーツ (28x20 center at 14,0)
  parts.torso = generatePartCanvas(28, 20, (pc, w, h) => {
    const grad = pc.createLinearGradient(0, 0, 0, 15);
    grad.addColorStop(0, jerseyLight); grad.addColorStop(0.3, jersey); grad.addColorStop(1, jerseyDark);
    pc.fillStyle = grad;
    pc.beginPath();
    pc.moveTo(1, 0); pc.lineTo(27, 0); pc.lineTo(26, 15); pc.lineTo(2, 15);
    pc.closePath(); pc.fill();
    // 襟（V字）
    pc.fillStyle = jerseyDark;
    pc.beginPath(); pc.moveTo(10, 0); pc.lineTo(14, 5); pc.lineTo(18, 0); pc.closePath(); pc.fill();
    // 肩ライン
    pc.fillStyle = jerseyLight; pc.fillRect(1, 0, 26, 2);
    // 脇シャドウ
    pc.fillStyle = 'rgba(0,0,0,0.15)';
    pc.fillRect(1, 3, 4, 12); pc.fillRect(23, 3, 4, 12);
    // ゼッケン
    pc.fillStyle = '#fff'; pc.font = 'bold 10px Arial'; pc.textAlign = 'center';
    pc.fillText(isPlayer ? '1' : '2', 14, 13);
    // 腰ベルト
    const beltGrad = pc.createLinearGradient(0, 15, 0, 20);
    beltGrad.addColorStop(0, jerseyDark); beltGrad.addColorStop(1, shorts);
    pc.fillStyle = beltGrad;
    pc.beginPath(); pc.roundRect(2, 15, 24, 5, 1); pc.fill();
  });

  // ショーツパーツ (26x12)
  parts.hip = generatePartCanvas(26, 12, (pc, w, h) => {
    const grad = pc.createLinearGradient(0, 0, 0, 12);
    grad.addColorStop(0, shorts); grad.addColorStop(1, shortsDark);
    pc.fillStyle = grad;
    pc.beginPath(); pc.roundRect(0, 0, 26, 12, 3); pc.fill();
    pc.fillStyle = shortsDark; pc.fillRect(0, 0, 3, 12); pc.fillRect(23, 0, 3, 12);
    pc.fillStyle = 'rgba(255,255,255,0.08)'; pc.fillRect(3, 9, 20, 2);
  });

  // 太ももパーツ (12x10) - skin色、太め
  parts.thigh = generatePartCanvas(12, 10, (pc, w, h) => {
    const grad = pc.createLinearGradient(0, 0, 12, 0);
    grad.addColorStop(0, skinDark); grad.addColorStop(0.4, skin); grad.addColorStop(1, skinDark);
    pc.fillStyle = grad;
    pc.beginPath(); pc.roundRect(1, 0, 10, 10, [4, 4, 3, 3]); pc.fill();
  });

  // すねパーツ (10x9) - sock + band、太め
  parts.shin = generatePartCanvas(10, 9, (pc, w, h) => {
    const grad = pc.createLinearGradient(0, 0, 10, 0);
    grad.addColorStop(0, '#e0e0e0'); grad.addColorStop(0.4, sock); grad.addColorStop(1, '#d8d8d8');
    pc.fillStyle = grad;
    pc.beginPath(); pc.roundRect(1, 0, 8, 9, 2.5); pc.fill();
    // ソックスバンド
    pc.fillStyle = sockBand; pc.fillRect(1.5, 0, 7, 2.5);
  });

  // 靴パーツ (14x8) - 大きめ
  parts.shoe = generatePartCanvas(14, 8, (pc, w, h) => {
    const grad = pc.createLinearGradient(0, 0, 0, 8);
    grad.addColorStop(0, '#353535'); grad.addColorStop(1, '#101010');
    pc.fillStyle = grad;
    pc.beginPath();
    pc.moveTo(1, 1); pc.lineTo(12, 1); pc.quadraticCurveTo(14, 2.5, 13, 5);
    pc.lineTo(12, 6.5); pc.quadraticCurveTo(7, 8, 1, 6.5);
    pc.closePath(); pc.fill();
    // ソール
    pc.fillStyle = '#555'; pc.fillRect(1, 6, 12, 2);
    // ストライプ
    pc.strokeStyle = 'rgba(255,255,255,0.35)'; pc.lineWidth = 1;
    pc.beginPath(); pc.moveTo(5, 1.5); pc.lineTo(7, 5.5); pc.stroke();
    pc.beginPath(); pc.moveTo(7, 1.5); pc.lineTo(9, 5.5); pc.stroke();
  });

  // 上腕パーツ (11x9) - jersey色の袖、太め
  parts.upperArm = generatePartCanvas(11, 9, (pc, w, h) => {
    const grad = pc.createLinearGradient(0, 0, 11, 0);
    grad.addColorStop(0, jerseyDark); grad.addColorStop(0.4, jersey); grad.addColorStop(1, jerseyDark);
    pc.fillStyle = grad;
    pc.beginPath(); pc.roundRect(1.5, 0, 8, 9, 3); pc.fill();
    pc.fillStyle = jerseyLight; pc.fillRect(2, 7, 7, 2);
  });

  // 前腕パーツ (10x8) - skin色、太め
  parts.forearm = generatePartCanvas(10, 8, (pc, w, h) => {
    const grad = pc.createLinearGradient(0, 0, 10, 0);
    grad.addColorStop(0, skinDark); grad.addColorStop(0.35, skin); grad.addColorStop(1, skinDark);
    pc.fillStyle = grad;
    pc.beginPath(); pc.roundRect(1.5, 0, 7, 8, 2.5); pc.fill();
  });

  // 手パーツ (8x8) - 大きめ
  parts.hand = generatePartCanvas(8, 8, (pc, w, h) => {
    pc.fillStyle = skin;
    pc.beginPath(); pc.ellipse(4, 4, 3.5, 3.5, 0, 0, Math.PI * 2); pc.fill();
    pc.fillStyle = skinDark;
    pc.beginPath(); pc.ellipse(4, 4, 3.2, 3.2, 0, Math.PI * 0.6, Math.PI * 0.9); pc.fill();
  });

  // 首パーツ (6x5)
  parts.neck = generatePartCanvas(6, 5, (pc, w, h) => {
    const grad = pc.createLinearGradient(0, 0, 6, 0);
    grad.addColorStop(0, skinDark); grad.addColorStop(0.5, skin); grad.addColorStop(1, skinDark);
    pc.fillStyle = grad;
    pc.beginPath(); pc.roundRect(1, 0, 4, 5, 1.5); pc.fill();
  });

  return parts;
}

// パーツキャッシュ
let _playerParts = null, _cpuParts = null;
function getPlayerParts(isPlayer) {
  if (isPlayer) { if (!_playerParts) _playerParts = generatePlayerParts(true); return _playerParts; }
  else { if (!_cpuParts) _cpuParts = generatePlayerParts(false); return _cpuParts; }
}

// パーツ画像版の2関節リム描画
function drawLimbImg(originX, originY, hipAngleDeg, kneeAngleDeg, upperPart, lowerPart, capPart, upperLen, lowerLen) {
  ctx.save();
  ctx.translate(originX, originY);
  ctx.rotate(hipAngleDeg * Math.PI / 180);
  // 上肢パーツ
  ctx.drawImage(upperPart, -upperPart.width / 8, 0, upperPart.width / 4, upperLen);
  ctx.translate(0, upperLen);
  ctx.rotate(kneeAngleDeg * Math.PI / 180);
  // 下肢パーツ
  ctx.drawImage(lowerPart, -lowerPart.width / 8, 0, lowerPart.width / 4, lowerLen);
  ctx.translate(0, lowerLen);
  // 末端パーツ（靴/手）
  if (capPart) {
    ctx.drawImage(capPart, -capPart.width / 8, -capPart.height / 8, capPart.width / 4, capPart.height / 4);
  }
  ctx.restore();
}

// ── アニメーション補間ヘルパー（描画専用：物理に未関与） ──
function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
function easeOutBack(t) { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }
// 2関節IK：肩(origin)から手先 target(tx,ty:ローカル相対) へ届く肩角・肘角を逆算
// drawLimb の規約（角度0で真下=(0,1)方向）に合わせて degree を返す。bendSign で肘の曲げ向き。
function solveIK(tx, ty, L1, L2, bendSign) {
  let d = Math.hypot(tx, ty);
  const dmin = Math.abs(L1 - L2) + 0.001, dmax = L1 + L2 - 0.001;
  d = Math.max(dmin, Math.min(dmax, d));
  const aim = Math.atan2(-tx, ty); // (0,1)=真下 を基準にした目標方向
  const clamp = v => Math.max(-1, Math.min(1, v));
  const a1 = Math.acos(clamp((d * d + L1 * L1 - L2 * L2) / (2 * d * L1)));
  const interior = Math.acos(clamp((L1 * L1 + L2 * L2 - d * d) / (2 * L1 * L2)));
  const hip = (aim + bendSign * a1) * 180 / Math.PI;
  const knee = bendSign * (interior - Math.PI) * 180 / Math.PI;
  return { hip, knee };
}
// キーフレーム列 [{p, v}] を進行度 p(0..1) でサンプリング（区間ごとに easeInOut 補間）
function sampleKF(keys, p) {
  if (p <= keys[0].p) return keys[0].v;
  for (let i = 1; i < keys.length; i++) {
    if (p <= keys[i].p) {
      const a = keys[i - 1], b = keys[i];
      const lt = (p - a.p) / (b.p - a.p || 1);
      return a.v + (b.v - a.v) * easeInOut(lt);
    }
  }
  return keys[keys.length - 1].v;
}
// オーバーヘッドキック（自転車キック）のキーフレーム（角度°）
// 踏み切り→回転→p=0.5で完全逆さ＆全身伸展（インパクトの決めポーズ）→回転→着地

  pelvis:    [{p:0,v:0},{p:0.12,v:-20},{p:0.25,v:-70},{p:0.40,v:-160},{p:0.55,v:-260},{p:0.70,v:-320},{p:0.85,v:-350},{p:1,v:-360}],
  pelvisCPU: [{p:0,v:0},{p:0.12,v:-20},{p:0.25,v:-70},{p:0.40,v:-160},{p:0.55,v:-130},{p:0.70,v:-80},{p:0.85,v:-30},{p:1,v:0}],
  // 背中の反り：インパクトで上半身を右（ネット方向）に向ける
  spine:  [{p:0,v:0},{p:0.12,v:5},{p:0.25,v:20},{p:0.40,v:55},{p:0.55,v:45},{p:0.70,v:20},{p:0.85,v:6},{p:1,v:0}],

  shin:   [{p:0,v:25},{p:0.25,v:50},{p:0.40,v:0},{p:0.55,v:95},{p:0.70,v:110},{p:0.85,v:50},{p:1,v:25}],

  sShin:  [{p:0,v:15},{p:0.25,v:40},{p:0.40,v:0},{p:0.55,v:110},{p:0.70,v:115},{p:0.85,v:45},{p:1,v:15}],
  // 腕：インパクトで大きく広げ、回収時に体に沿わせる

  armF:   [{p:0,v:8},{p:0.25,v:55},{p:0.40,v:85},{p:0.55,v:65},{p:0.70,v:25},{p:1,v:8}],
};

function drawPlayer(ent) {
  ctx.save();
  ctx.translate(ent.x, ent.y);

  // 必殺技アタック中はシルエット画像を表示
  if (fireballActive && ent.overheadState === 2 && ent.kickEffect > 0) {
    const silImg = ent.isPlayer ? playerSpecialImg : cpuSpecialImg;
    if (silImg && silImg.complete && silImg.naturalWidth > 0) {
      const sh = 204;
      const sw = sh * (silImg.naturalWidth / silImg.naturalHeight);
      ctx.scale(ent.facing, 1);
      ctx.drawImage(silImg, -sw / 2, -sh + 10, sw, sh);
      ctx.restore();
      return;
    }
  }

  const isOverhead = ent.overheadState === 2;
  const scale = ent.facing;
  ctx.scale(scale * 1.3, 1.3); // キャラクターの大きさ

  // キャラクター画像モード（プレイヤーのみ）
  if (selectedCharacter && ent.isPlayer && selectedCharacter.img && selectedCharacter.img.complete) {
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 0, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    const kickBase = isOverhead ? 14 : 10;
    const kickPow = ent.kickEffect > 0 ? Math.min(1, ent.kickEffect / kickBase) : 0;
    ctx.save();
    if (isOverhead) {
      ctx.translate(0, -PLAYER_H);
      ctx.rotate(Math.PI);
    } else if (kickPow > 0) {
      ctx.rotate(-0.35 * kickPow);
    }
    const charId = selectedCharacter.id;
    const sizeScale = (charId === 'kato_k' || charId === 'ito_yuhi') ? 0.5 : 1;
    const widthScale = (charId === 'tsubo_kura') ? 0.7 : 1;
    const imgH = PLAYER_H * 2.5 * sizeScale;
    const imgW = imgH * (selectedCharacter.img.naturalWidth / selectedCharacter.img.naturalHeight) * widthScale;
    const groundOffset = imgH * 0.23;
    ctx.drawImage(selectedCharacter.img, -imgW / 2, -imgH + groundOffset, imgW, imgH);
    ctx.restore();
    ctx.restore();
    return;
  }

  // パーツ画像取得
  const P = getPlayerParts(ent.isPlayer);

  // ── プロポーション定義（約2.5頭身：Head Soccer風デフォルメ体型） ──
  const headR       = 10;
  const headCenterY = -58;
  const neckY       = -49;
  const shoulderY   = -46;
  const chestBottomY= -32;
  const hipY        = -24;
  const shortsBottomY = -14;
  let thighLen      = 10;  // オーバーヘッド時のみ後で延長
  let shinLen       = 9;
  const upperArmLen = 13;  // 腕を長くして走りの振りを強調
  const forearmLen  = 12;

  // ── 描画専用アニメ状態（物理に未関与・drawPlayer 内で遅延初期化／更新） ──
  if (ent.landSquash === undefined) ent.landSquash = 0;
  if (ent.bodyLean === undefined) ent.bodyLean = 0;
  if (ent._prevOnGround === undefined) ent._prevOnGround = ent.onGround;
  if (ent._prevVy === undefined) ent._prevVy = 0;
  // 着地検出（前フレーム空中→今フレーム接地）。落下速度に応じてスクワッシュ
  if (ent.onGround && !ent._prevOnGround) {
    ent.landSquash = Math.min(1, Math.max(0, ent._prevVy * 0.05));
  } else {
    ent.landSquash *= 0.82;
    if (ent.landSquash < 0.01) ent.landSquash = 0;
  }
  ent._prevOnGround = ent.onGround;
  ent._prevVy = ent.vy;
  // 体の傾き（vx をローパス）＝慣性で体が流れる表現
  const leanTarget = Math.max(-1, Math.min(1, ent.vx / 18));
  ent.bodyLean += (leanTarget - ent.bodyLean) * 0.18;

  // ── ポーズ角の決定（オーバーヘッドはフェーズ補間、それ以外は歩行＋通常キック） ──
  let pelvisRot = 0, spineArch = 0;
  let backHip, backKnee, frontHip, frontKnee, backArm, frontArm;
  let backArmKnee = 18, frontArmKnee = -18; // 肘角（IK未使用時のデフォルト）

  // ── オーバーヘッド描画アニメ（物理タイマーと独立） ──
  // 描画専用カウンター _ohAnim を 0→1 まで進める。
  // 逆さ姿勢（p≈0.45）でホールド（一時停止）を入れてオーバーヘッド感を出す。
  if (ent._ohAnim === undefined) ent._ohAnim = 1;
  if (ent._ohHold === undefined) ent._ohHold = 0;
  if (ent._prevOH === undefined) ent._prevOH = false;
  // 新規アタック開始時のみリセット（物理タイマーには依存しない）
  if (isOverhead && !ent._prevOH) { ent._ohAnim = 0; ent._ohHold = 0; }
  ent._prevOH = isOverhead;
  const OH_VISUAL_FRAMES = 36;     // 回転速度
  const OH_HOLD_START = 0.40;      // 完全逆さ＝決めポーズでホールド
  const OH_HOLD_FRAMES = 12;       // ホールド時間（約0.2秒）
  if (ent._ohAnim < 1) {
    if (ent._ohAnim >= OH_HOLD_START && ent._ohHold < OH_HOLD_FRAMES) {
      ent._ohHold++;
      ent._ohAnim = OH_HOLD_START; // ホールド位置で固定
    } else {
      ent._ohAnim = Math.min(1, ent._ohAnim + 1 / OH_VISUAL_FRAMES);
    }
  }
  const ohActive = ent._ohAnim < 1;

  if (ohActive) {
    const p = ent._ohAnim;
    // このフォーム時のみ脚を延長（インパクト付近で最大に伸びる）
    const legStretch = Math.sin(Math.min(1, p) * Math.PI); // 0→1→0
    thighLen = 10 + 4 * legStretch;
    shinLen  = 9 + 4 * legStretch;
    // 蹴り足がネット方向（facing方向）に出るよう正方向回転
    pelvisRot = sampleKF(ent.isPlayer ? OH_KF.pelvis : OH_KF.pelvisCPU, p);
    spineArch = sampleKF(OH_KF.spine, p);
    frontHip  = sampleKF(OH_KF.thigh, p);
    frontKnee = sampleKF(OH_KF.shin, p);
    backHip   = sampleKF(OH_KF.sThigh, p);
    backKnee  = sampleKF(OH_KF.sShin, p);
    // ── 腕：万歳ではなく内側に折りたたむ（肘を曲げて胸の前へ） ──
    const fold = Math.sin(Math.min(1, p) * Math.PI); // 0→1→0
    backArm  = 30 * fold;  backArmKnee  = 120 * fold;
    frontArm = -30 * fold; frontArmKnee = -120 * fold;
  } else {
    const onG = ent.onGround;
    // 走りの強さ（速度依存）：止まれば小さく、速いほど大きく振る
    const run = Math.min(1, Math.abs(ent.vx) / 12);
    const s   = Math.sin(ent.limbAnim);
    const armAmp = onG ? (18 + 60 * run) : 10;  // 腕の振り（左右が入れ替わるほど大きく）
    // 脚の前後度（前方に来た側=fFwd/bFwd）
    const fFwd = Math.max(0, -s), fBack = Math.max(0, s);
    const bFwd = Math.max(0,  s), bBack = Math.max(0, -s);
    // 走り時：前に出した脚は股関節を持ち上げ＋膝90度で足が浮く、後脚は伸ばして蹴り出し
    const liftHip = (onG ? 80 : 30) * run, pushHip = (onG ? 38 : 16) * run;
    const foldKnee = (onG ? 90 : 40) * run, straightKnee = 12 * run;
    // 通常キック：kickEffect を easeInOut で補間（線形→滑らかに）
    let kp = ent.kickEffect > 0 ? Math.min(1, ent.kickEffect / 10) : 0;
    kp = kp > 0 ? easeInOut(kp) : 0;
    if (kp > 0) {
      backHip = 40 * kp;  backKnee = 26 * kp;
      frontHip = -150 * kp; frontKnee = 95 * kp;
      backArm = -30 * kp; backArmKnee = 30;
      frontArm = 40 * kp; frontArmKnee = -30;
    } else {
      // 脚：前方の脚は膝を上げて足を浮かせ、後方の脚は伸ばして地面を蹴る
      frontHip  = -liftHip * fFwd + pushHip * fBack;
      backHip   = -liftHip * bFwd + pushHip * bBack;
      frontKnee =  foldKnee * fFwd + straightKnee * fBack;
      backKnee  =  foldKnee * bFwd + straightKnee * bBack;
      // 腕：脚と逆位相で大きく振り、前に振った側は肘を約120度曲げ手が上、
      //     後ろに引いた側は肘を伸ばし手が下に落ちる
      backArm   =  s * armAmp;  backArmKnee  =  40 + 80 * Math.max(0,  s);
      frontArm  = -s * armAmp;  frontArmKnee = -(40 + 80 * Math.max(0, -s));
    }
  }

  // ── スクワッシュ&ストレッチ＋体の傾き（足元 y=0 を基準に全身へ適用） ──
  const sq = ent.landSquash;
  ctx.scale(1 + 0.16 * sq, 1 - 0.20 * sq);
  if (!ohActive) ctx.rotate(ent.bodyLean * 0.14);

  // 影（接地時に潰れて広がる）
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 20 * (1 + 0.3 * sq), 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // オーバーヘッドのフォームは蹴る向きを反転（facingと逆＝相手コート方向へ蹴る）
  if (ohActive) ctx.scale(-1, 1);

  // ── 腰ボーン ──
  ctx.save();
  ctx.translate(0, hipY);
  ctx.rotate(pelvisRot * Math.PI / 180);
  ctx.translate(0, -hipY);

  // ── 脚（太もも→すね→靴、パーツ画像版） ──
  drawLimbImg(-5, shortsBottomY, backHip, backKnee, P.thigh, P.shin, P.shoe, thighLen, shinLen);
  drawLimbImg(5, shortsBottomY, frontHip, frontKnee, P.thigh, P.shin, P.shoe, thighLen, shinLen);

  // ── ショーツ ──
  ctx.drawImage(P.hip, -13, hipY, 26, shortsBottomY - hipY + 2);

  // ── 上半身ボーン ──
  ctx.save();
  ctx.translate(0, hipY);
  ctx.rotate(spineArch * Math.PI / 180);
  ctx.translate(0, -hipY);

  // ── 胴体（胸＋腰ベルト） ──
  ctx.drawImage(P.torso, -14, shoulderY, 28, chestBottomY - shoulderY + (hipY - chestBottomY) + 2);

  // ── 腕（パーツ画像版） ──
  drawLimbImg(-14, shoulderY + 2, backArm, backArmKnee, P.upperArm, P.forearm, P.hand, upperArmLen, forearmLen);
  drawLimbImg(14, shoulderY + 2, frontArm, frontArmKnee, P.upperArm, P.forearm, P.hand, upperArmLen, forearmLen);

  // ── 首 ──
  ctx.drawImage(P.neck, -3, neckY, 6, shoulderY - neckY + 1);

  // ── 頭ボーン ──
  ctx.save();
  if (!ohActive) {
    const dxb = (ball.x - ent.x) * ent.facing;
    const dyb = ball.y - (ent.y + headCenterY * 1.4);
    let neckAng = Math.atan2(dyb, Math.abs(dxb) + 20) * 0.45;
    neckAng = Math.max(-0.4, Math.min(0.4, neckAng));
    ctx.translate(0, neckY);
    ctx.rotate(neckAng);
    ctx.translate(0, -neckY);
  }
  // 頭パーツ画像
  ctx.drawImage(P.head, -12, headCenterY - 14, 24, 26);

  ctx.restore(); // 頭ボーン
  ctx.restore(); // 上半身ボーン
  ctx.restore(); // 腰ボーン
  ctx.restore(); // drawPlayer 外側
}


// ── 描画：ボール ──────────────────────────────────
function drawBall() {
  // ファイヤーボールの炎エフェクト
  if (fireballActive) {
    for (let i = 0; i < 8; i++) {
      const t = i / 8;
      const dx = ball.vx > 0 ? i * 6 : -i * 6;
      ctx.fillStyle = 'rgba(255,' + Math.floor(180 - t * 150) + ',0,' + (0.5 - t * 0.5) + ')';
      ctx.beginPath();
      ctx.arc(ball.x - dx, ball.y - i * 1.5, BALL_R * (1 + t * 0.6), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // トレイル
  ball.trail.forEach((t, i) => {
    const alpha = (i / ball.trail.length) * 0.4;
    const r = BALL_R * (i / ball.trail.length) * 0.8;
    ctx.fillStyle = fireballActive ? `rgba(255,100,0,${alpha})` : `rgba(255,180,50,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fill();
  });

  // ボール本体
  ctx.save();
  ctx.translate(ball.x, ball.y);
  ctx.rotate(ball.spin * 0.1);

  const ballGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, BALL_R);
  if (fireballActive) {
    ballGrad.addColorStop(0, '#ffffff');
    ballGrad.addColorStop(0.4, '#ff6600');
    ballGrad.addColorStop(1, '#cc0000');
  } else {
    ballGrad.addColorStop(0, '#fff8e0');
    ballGrad.addColorStop(0.4, '#f8d040');
    ballGrad.addColorStop(1, '#c87000');
  }
  ctx.fillStyle = ballGrad;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI * 2); ctx.fill();

  // ボール模様（セパタクロー風）
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1.2;
  // 横線
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(0, i * 5, BALL_R, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  // 縦線
  for (let a = 0; a < Math.PI; a += Math.PI / 3) {
    ctx.beginPath();
    ctx.ellipse(0, 0, 4, BALL_R, a, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

// ── 描画：エフェクト ──────────────────────────────
function drawEffects() {
  effects.forEach(e => {
    const a = e.life / e.maxLife;
    ctx.fillStyle = e.color + Math.floor(a * 255).toString(16).padStart(2, '0');
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r * a, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ── 描画：スコア ──────────────────────────────────
function drawScore() {
  ctx.save();
  // スコアボード背景
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.roundRect(W/2 - 90, 10, 180, 44, 8); ctx.fill();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#adf';
  ctx.font = 'bold 13px Arial';
  ctx.fillText('PLAYER', W/2 - 45, 26);
  ctx.fillStyle = '#faa';
  ctx.fillText('CPU', W/2 + 45, 26);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px Arial';
  ctx.fillText(score.p, W/2 - 45, 48);
  ctx.fillText(score.cpu, W/2 + 45, 48);

  ctx.fillStyle = '#888';
  ctx.font = '18px Arial';
  ctx.fillText('-', W/2, 44);
  ctx.restore();
}

// ── 描画：必殺技ゲージ ──────────────────────────
function drawSpecialGauge() {
  if (gameState !== 'play') return;
  const cnt = player.specialGauge;
  const x = W / 2 - 90, y = H - 30, w = 180, h = 12;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.roundRect(x - 2, y - 2, w + 4, h + 4, 4); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 3); ctx.fill();
  const ratio = cnt / PLAYER_SPECIAL_COST;
  if (cnt >= PLAYER_SPECIAL_COST) {
    ctx.fillStyle = '#ffdd33';
  } else {
    const gg = ctx.createLinearGradient(x, 0, x + w, 0);
    gg.addColorStop(0, '#ff8a00'); gg.addColorStop(1, '#ff2a00');
    ctx.fillStyle = gg;
  }
  ctx.beginPath(); ctx.roundRect(x, y, w * ratio, h, 3); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
  ctx.fillText('SPECIAL ' + cnt + '/' + PLAYER_SPECIAL_COST, W / 2, y - 4);
}

// ── 描画：カットイン ────────────────────────────
function drawSpecialCutIn() {
  if (!specialCutInActive) return;
  ctx.save();
  if (specialCutInImg && specialCutInImg.complete && specialCutInImg.naturalWidth > 0) {
    ctx.drawImage(specialCutInImg, 0, 0, W, H);
  } else {
    const g = ctx.createRadialGradient(W/2, H/2, 20, W/2, H/2, 300);
    g.addColorStop(0, 'rgba(60,0,0,0.9)'); g.addColorStop(1, 'rgba(0,0,0,0.95)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,120,0,0.4)'; ctx.lineWidth = 2;
    for (let a = 0; a < 24; a++) {
      const an = a / 24 * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(W/2 + Math.cos(an) * 40, H/2 + Math.sin(an) * 40);
      ctx.lineTo(W/2 + Math.cos(an) * 400, H/2 + Math.sin(an) * 400);
      ctx.stroke();
    }
    const who = specialCutInEntity;
    const name = who && who.isPlayer ? 'プレイヤー' : 'CPU';
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#ff3000'; ctx.lineWidth = 3;
    ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
    ctx.strokeText(name + 'の必殺技！', W/2, H/2 - 10);
    ctx.fillText(name + 'の必殺技！', W/2, H/2 - 10);
    ctx.fillStyle = '#ffcc33'; ctx.font = '16px Arial';
    ctx.fillText('ファイヤーアタック！！', W/2, H/2 + 24);
  }
  ctx.restore();
}

// ── 描画：オーバーレイ ────────────────────────────
function drawOverlay() {
  if (gameState === 'point' || gameState === 'gameover') {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    if (gameState === 'gameover') {
      const winner = score.p >= WIN_SCORE ? 'プレイヤー' : 'CPU';
      ctx.font = 'bold 44px Arial';
      ctx.fillStyle = score.p >= WIN_SCORE ? '#4af' : '#f64';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 20;
      ctx.fillText(winner + ' の勝利！', W/2, H/2 - 20);
      ctx.shadowBlur = 0;
      ctx.font = '20px Arial';
      ctx.fillStyle = '#ccc';
      ctx.fillText('スペースキーでリスタート', W/2, H/2 + 24);
    } else {
      ctx.font = 'bold 36px Arial';
      ctx.fillStyle = '#ff0';
      ctx.shadowColor = '#f80';
      ctx.shadowBlur = 16;
      ctx.fillText(pointMsg, W/2, H/2);
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }
}

// ── メインループ ──────────────────────────────────
function updateEffects() {
  effects = effects.filter(e => e.life-- > 0);
  effects.forEach(e => { e.x += e.vx; e.y += e.vy; e.vx *= 0.92; e.vy *= 0.92; });
}

let lastTime = 0;
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawNet();

  if (mode === 'cpu') {
    if (specialCutInActive) {
      specialCutInTimer--;
      if (specialCutInTimer <= 0) {
        specialCutInActive = false;
        executeSpecialAttack(specialCutInEntity || player);
        specialCutInEntity = null;
      }
    } else if (gameState === 'play') {
      updatePlayer(player, localInput());
      updatePlayer(cpu, null);
      updateBallSubsteps(true);
      updateEffects();
    } else if (gameState === 'point') {
      pointTimer--;
      if (pointTimer <= 0) resetAfterPoint();
    } else if (gameState === 'gameover') {
      if (pointTimer <= 0) {
        if (score.p >= WIN_SCORE) {
          if (!gachaShown) {
            gachaShown = true;
            showGachaScreen();
          }
        } else if (keys['Space']) {
          score = { p: 0, cpu: 0 };
          resetEntities();
          gameState = 'play';
        }
      }
      pointTimer = Math.max(0, pointTimer - 1);
    }
  } else if (mode === 'host') {
    if (specialCutInActive) {
      specialCutInTimer--;
      if (specialCutInTimer <= 0) {
        specialCutInActive = false;
        executeSpecialAttack(specialCutInEntity || player);
        specialCutInEntity = null;
      }
    } else if (gameState === 'play') {
      updatePlayer(player, localInput());
      updatePlayer(cpu, remoteInput);
      updateBallSubsteps(true);
      updateEffects();
    } else if (gameState === 'point') {
      pointTimer--;
      if (pointTimer <= 0) resetAfterPoint();
    } else if (gameState === 'gameover') {
      if (localInput().jump && pointTimer <= 0) {
        score = { p: 0, cpu: 0 };
        resetEntities();
        gameState = 'play';
      }
      pointTimer = Math.max(0, pointTimer - 1);
    }
    netTimer++;
    if (webrtcConnected) {
      if (netTimer % 2 === 0) {
        sendViaChannel({
          type: 'state',
          ball: { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy, spin: ball.spin },
          score, gameState, pointMsg, pointTimer,
          _rtt: netLatency.rtt,
          input: localInput(),
          specialCutInActive, specialCutInTimer,
          specialCutInIsPlayer: specialCutInEntity ? specialCutInEntity.isPlayer : null,
          fireballActive,
          player: {
            x: player.x, y: player.y, facing: player.facing, limbAnim: player.limbAnim,
            onGround: player.onGround, overheadState: player.overheadState, kickEffect: player.kickEffect,
            specialGauge: player.specialGauge,
          },
          cpu: {
            x: cpu.x, y: cpu.y, facing: cpu.facing, limbAnim: cpu.limbAnim,
            onGround: cpu.onGround, overheadState: cpu.overheadState, kickEffect: cpu.kickEffect,
            specialGauge: cpu.specialGauge,
          },
        });
      }
      pingTimer++;
      if (pingTimer % 60 === 0) {
        sendViaChannel({ type: 'ping', t: performance.now() });
      }
    } else if (roomRef) {
      if (netTimer % 10 === 0) {
        roomRef.child('hostState').set({
          ball: { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy, spin: ball.spin },
          score, gameState, pointMsg, pointTimer,
          _rtt: netLatency.rtt,
          input: localInput(),
          specialCutInActive, specialCutInTimer,
          specialCutInIsPlayer: specialCutInEntity ? specialCutInEntity.isPlayer : null,
          fireballActive,
          player: {
            x: player.x, y: player.y, facing: player.facing, limbAnim: player.limbAnim,
            onGround: player.onGround, overheadState: player.overheadState, kickEffect: player.kickEffect,
            specialGauge: player.specialGauge,
          },
          cpu: {
            x: cpu.x, y: cpu.y, facing: cpu.facing, limbAnim: cpu.limbAnim,
            onGround: cpu.onGround, overheadState: cpu.overheadState, kickEffect: cpu.kickEffect,
            specialGauge: cpu.specialGauge,
          },
        });
      }
      pingTimer++;
      if (pingTimer % 120 === 0) {
        roomRef.child('ping').set({ t: performance.now() });
      }
    }
  } else if (mode === 'guest') {
    const wasGameState = gameState;
    if (gameState === 'play' && !specialCutInActive) {
      updatePlayer(cpu, localInput());
      updateBallSubsteps(true);
      updateEffects();
    }
    netTimer++;
    {
      const gi = localInput();
      const changed = !lastSentGuestInput ||
        gi.left !== lastSentGuestInput.left || gi.right !== lastSentGuestInput.right ||
        gi.jump !== lastSentGuestInput.jump || gi.kick !== lastSentGuestInput.kick ||
        gi.overhead !== lastSentGuestInput.overhead || gi.special !== lastSentGuestInput.special;
      if (changed || netTimer % 3 === 0) {
        if (webrtcConnected) {
          sendViaChannel({ type: 'input', input: gi });
        } else if (roomRef) {
          roomRef.child('guestInput').set(gi);
        }
        lastSentGuestInput = gi;
      }
    }

    if (remoteHostState) {
      score = remoteHostState.score;
      gameState = remoteHostState.gameState;
      pointMsg = remoteHostState.pointMsg;
      pointTimer = remoteHostState.pointTimer;

      const rbx = remoteHostState.ball.x, rby = remoteHostState.ball.y;
      const bdx = rbx - ball.x, bdy = rby - ball.y;
      const dist = Math.sqrt(bdx * bdx + bdy * bdy);
      if (dist > 80) {
        ball.x = rbx; ball.y = rby;
        ball.vx = remoteHostState.ball.vx;
        ball.vy = remoteHostState.ball.vy;
      } else {
        ball.x += bdx * 0.3;
        ball.y += bdy * 0.3;
        ball.vx += (remoteHostState.ball.vx - ball.vx) * 0.6;
        ball.vy += (remoteHostState.ball.vy - ball.vy) * 0.6;
      }
      ball.spin = remoteHostState.ball.spin;

      if (remoteHostState.player) {
        const rp = remoteHostState.player;
        player.x = rp.x;
        player.y = rp.y;
        player.facing = rp.facing;
        player.limbAnim = rp.limbAnim;
        player.onGround = rp.onGround;
        player.overheadState = rp.overheadState;
        player.kickEffect = rp.kickEffect;
        if (rp.specialGauge != null) player.specialGauge = rp.specialGauge;
      }

      if (remoteHostState.cpu) {
        const rc = remoteHostState.cpu;
        cpu.x += (rc.x - cpu.x) * 0.4;
        cpu.y += (rc.y - cpu.y) * 0.4;
        cpu.facing = rc.facing;
        cpu.limbAnim = rc.limbAnim;
        cpu.onGround = rc.onGround;
        cpu.overheadState = rc.overheadState;
        cpu.kickEffect = rc.kickEffect;
        if (rc.specialGauge != null) cpu.specialGauge = rc.specialGauge;
      }

      specialCutInActive = !!remoteHostState.specialCutInActive;
      specialCutInTimer = remoteHostState.specialCutInTimer || 0;
      fireballActive = !!remoteHostState.fireballActive;
      if (remoteHostState.specialCutInIsPlayer === true) {
        specialCutInEntity = player;
      } else if (remoteHostState.specialCutInIsPlayer === false) {
        specialCutInEntity = cpu;
      }

      if (wasGameState !== 'play' && gameState === 'play') {
        cpu.x = W * 0.75; cpu.y = GROUND; cpu.vx = 0; cpu.vy = 0; cpu.onGround = true;
        ball.x = rbx; ball.y = rby;
        ball.trail = [];
        effects = [];
      }
    }
  }

  drawEffects();
  drawBall();
  drawPlayer(player);
  drawPlayer(cpu);
  drawScore();
  drawSpecialGauge();
  if (mode === 'host' || mode === 'guest') drawLatency();
  drawOverlay();
  drawSpecialCutIn();
}

let netLatency = { rtt: 0, samples: [] };
let pingTimer = 0;
let lastSentGuestInput = null;
let dataChannel = null;
let peerConnection = null;
let webrtcConnected = false;
let webrtcSetupPromise = null;

let RTC_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.relay.metered.ca:80' },
    { urls: 'turn:global.relay.metered.ca:80', username: 'e330b48ad13e909d69664b5a', credential: 'rsZ2BL6l3I4CHD1c' },
    { urls: 'turn:global.relay.metered.ca:80?transport=tcp', username: 'e330b48ad13e909d69664b5a', credential: 'rsZ2BL6l3I4CHD1c' },
    { urls: 'turn:global.relay.metered.ca:443', username: 'e330b48ad13e909d69664b5a', credential: 'rsZ2BL6l3I4CHD1c' },
    { urls: 'turns:global.relay.metered.ca:443?transport=tcp', username: 'e330b48ad13e909d69664b5a', credential: 'rsZ2BL6l3I4CHD1c' },
  ],
  iceCandidatePoolSize: 10,
};

function sendViaChannel(data) {
  if (dataChannel && dataChannel.readyState === 'open') {
    dataChannel.send(JSON.stringify(data));
    return true;
  }
  return false;
}

function setupDataChannel(ch) {
  dataChannel = ch;
  dataChannel.onopen = () => {
    webrtcConnected = true;
    console.log('WebRTC DataChannel opened');
  };
  dataChannel.onclose = () => {
    webrtcConnected = false;
    console.log('WebRTC DataChannel closed');
  };
  dataChannel.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'state') {
        remoteHostState = msg;
        if (msg.input) remoteInput = msg.input;
        if (msg._rtt != null) {
          netLatency.rtt = msg._rtt;
          if (!netLatency.samples.length || netLatency.samples[netLatency.samples.length-1] !== msg._rtt) {
            netLatency.samples.push(msg._rtt);
            if (netLatency.samples.length > 30) netLatency.samples.shift();
          }
        }
      } else if (msg.type === 'input') {
        remoteInput = msg.input;
      } else if (msg.type === 'ping') {
        sendViaChannel({ type: 'pong', t: msg.t });
      } else if (msg.type === 'pong') {
        const rtt = performance.now() - msg.t;
        netLatency.rtt = rtt;
        netLatency.samples.push(rtt);
        if (netLatency.samples.length > 30) netLatency.samples.shift();
      }
    } catch(e) {}
  };
}

function setupWebRTC() {
  return new Promise((resolve) => {
    console.log('[WebRTC] ICE servers:', RTC_CONFIG.iceServers.length);
    peerConnection = new RTCPeerConnection(RTC_CONFIG);

    peerConnection.onicecandidate = (ev) => {
      if (ev.candidate && roomRef) {
        const path = mode === 'host' ? 'hostCandidates' : 'guestCandidates';
        roomRef.child(path).push(JSON.stringify(ev.candidate));
        console.log('[WebRTC] ICE candidate sent:', path);
      }
    };

    peerConnection.oniceconnectionstatechange = () => {
      console.log('[WebRTC] ICE state:', peerConnection.iceConnectionState);
    };

    peerConnection.onconnectionstatechange = () => {
      console.log('[WebRTC] Connection state:', peerConnection.connectionState);
    };

    if (mode === 'host') {
      console.log('[WebRTC] Host: creating DataChannel and offer...');
      const ch = peerConnection.createDataChannel('game', { ordered: false, maxRetransmits: 0 });
      setupDataChannel(ch);

      peerConnection.createOffer().then(offer => {
        console.log('[WebRTC] Host: offer created');
        return peerConnection.setLocalDescription(offer);
      }).then(() => {
        console.log('[WebRTC] Host: writing offer to Firebase');
        roomRef.child('offer').set(JSON.stringify(peerConnection.localDescription));
      }).catch(err => console.error('[WebRTC] Host offer error:', err));

      roomRef.child('answer').on('value', snap => {
        const v = snap.val();
        if (!v) return;
        console.log('[WebRTC] Host: received answer from guest');
        peerConnection.setRemoteDescription(JSON.parse(v)).then(() => {
          console.log('[WebRTC] Host: remote description set');
          roomRef.child('answer').off();
        }).catch(err => console.error('[WebRTC] Host setRemote error:', err));
      });

      roomRef.child('guestCandidates').on('child_added', snap => {
        const c = snap.val();
        if (c) {
          peerConnection.addIceCandidate(JSON.parse(c)).catch(err => console.error('[WebRTC] Host addICE error:', err));
        }
      });

      const checkOpen = setInterval(() => {
        if (webrtcConnected) { console.log('[WebRTC] Host: CONNECTED!'); clearInterval(checkOpen); resolve(); }
      }, 100);
      setTimeout(() => { console.log('[WebRTC] Host: TIMEOUT'); clearInterval(checkOpen); resolve(); }, 30000);

    } else {
      console.log('[WebRTC] Guest: waiting for offer...');
      peerConnection.ondatachannel = (ev) => {
        console.log('[WebRTC] Guest: DataChannel received');
        setupDataChannel(ev.channel);
      };

      roomRef.child('offer').on('value', snap => {
        const v = snap.val();
        if (!v) return;
        console.log('[WebRTC] Guest: offer received, creating answer...');
        peerConnection.setRemoteDescription(JSON.parse(v)).then(() => {
          console.log('[WebRTC] Guest: remote description set');
          return peerConnection.createAnswer();
        }).then(answer => {
          console.log('[WebRTC] Guest: answer created');
          return peerConnection.setLocalDescription(answer);
        }).then(() => {
          console.log('[WebRTC] Guest: writing answer to Firebase');
          roomRef.child('answer').set(JSON.stringify(peerConnection.localDescription));
          roomRef.child('offer').off();
        }).catch(err => console.error('[WebRTC] Guest answer error:', err));
      });

      roomRef.child('hostCandidates').on('child_added', snap => {
        const c = snap.val();
        if (c) {
          peerConnection.addIceCandidate(JSON.parse(c)).catch(err => console.error('[WebRTC] Guest addICE error:', err));
        }
      });

      const checkOpen = setInterval(() => {
        if (webrtcConnected) { console.log('[WebRTC] Guest: CONNECTED!'); clearInterval(checkOpen); resolve(); }
      }, 100);
      setTimeout(() => { console.log('[WebRTC] Guest: TIMEOUT'); clearInterval(checkOpen); resolve(); }, 30000);
    }
  });
}

function drawLatency() {
  const s = netLatency.samples;
  const connType = webrtcConnected ? 'WebRTC' : 'Firebase';
  ctx.save();
  const bw = 260, bh = 82;
  const bx = 10, by = 10;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  if (s.length === 0) {
    ctx.fillRect(bx, by, bw, 28);
    ctx.font = '12px monospace';
    ctx.fillStyle = webrtcConnected ? '#0f0' : '#f80';
    ctx.fillText(`接続: ${connType}  計測中...`, bx + 10, by + 18);
    ctx.restore();
    return;
  }
  const last = Math.round(s[s.length - 1]);
  const avg = Math.round(s.reduce((a, b) => a + b, 0) / s.length);
  const min = Math.round(Math.min(...s));
  const max = Math.round(Math.max(...s));
  const color = last < 100 ? '#0f0' : last < 200 ? '#ff0' : last < 400 ? '#f80' : '#f00';
  const label = last < 100 ? '快適' : last < 200 ? 'やや遅延' : last < 400 ? 'ラグあり' : '高遅延';
  ctx.fillRect(bx, by, bw, bh);
  ctx.font = 'bold 15px monospace';
  ctx.fillStyle = color;
  ctx.fillText(`RTT: ${last}ms [${label}]`, bx + 10, by + 18);
  ctx.font = '11px monospace';
  ctx.fillStyle = '#ccc';
  ctx.fillText(`平均:${avg}ms 最小:${min}ms 最大:${max}ms`, bx + 10, by + 36);
  ctx.fillText(`片道:~${Math.round(last/2)}ms 計測:${s.length}回`, bx + 10, by + 52);
  ctx.fillStyle = webrtcConnected ? '#0f0' : '#f80';
  ctx.fillText(`接続: ${connType}`, bx + 10, by + 68);
  ctx.restore();
}

function startFirebaseFallback() {
  console.log('Firebaseフォールバック開始');
  if (mode === 'host') {
    roomRef.child('guestInput').on('value', snap => {
      remoteInput = snap.val() || remoteInput;
    });
    roomRef.child('pong').on('value', snap => {
      const v = snap.val();
      if (!v || !v.t) return;
      const rtt = performance.now() - v.t;
      netLatency.rtt = rtt;
      netLatency.samples.push(rtt);
      if (netLatency.samples.length > 30) netLatency.samples.shift();
    });
  } else {
    roomRef.child('hostState').on('value', snap => {
      remoteHostState = snap.val();
      if (remoteHostState && remoteHostState.input) remoteInput = remoteHostState.input;
      if (remoteHostState && remoteHostState._rtt) {
        netLatency.rtt = remoteHostState._rtt;
        netLatency.samples.push(remoteHostState._rtt);
        if (netLatency.samples.length > 30) netLatency.samples.shift();
      }
    });
    roomRef.child('ping').on('value', snap => {
      const v = snap.val();
      if (!v || !v.t) return;
      roomRef.child('pong').set({ t: v.t });
    });
  }
}

  document.getElementById('collectionScreen').style.display = 'flex';
});

document.getElementById('collectionBackBtn').addEventListener('click', () => {
  document.getElementById('collectionScreen').style.display = 'none';
});

// ── オープニング演出（タイトルのフェードイン + ボイス） ──
let titleOpeningPlayed = false;
function playTitleOpening() {
  if (titleOpeningPlayed) return;
  titleOpeningPlayed = true;
  document.getElementById('titleText').classList.add('title-show');
  playSynthesizedSound('title_voice');
}
// 多くのブラウザは音声(speechSynthesis)の自動再生をブロックするため、
// 起動直後にも試すが、最初のタップ/キー操作のタイミングで確実に再生する
playTitleOpening();
document.addEventListener('pointerdown', () => {
  titleOpeningPlayed = false;
  playTitleOpening();
}, { once: true });
document.addEventListener('keydown', () => {
  titleOpeningPlayed = false;
  playTitleOpening();
}, { once: true });
</script>
</body>
</html>
