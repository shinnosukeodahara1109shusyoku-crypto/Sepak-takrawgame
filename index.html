<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セパタクロー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: #0a0a1a; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }
  #gameCanvas { border: 2px solid #334; display: block; max-width: 100vw; max-height: 78vh; width: auto; height: auto; }
  #ui { color: #fff; margin-bottom: 8px; font-size: 13px; opacity: 0.7; }

  /* ── タッチ操作 ── */
  #touchControls { display: none; }
  .touch-btn {
    position: fixed; user-select: none; touch-action: none;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%; color: #fff; font-size: 22px; font-weight: bold;
    width: 60px; height: 60px;
  }
  .touch-btn.active { background: rgba(255,255,255,0.35); }
  #btnLeft, #btnRight, #btnJump, #btnDown { font-family: Arial, sans-serif; font-size: 24px; }
  #btnLeft   { left: 16px;  bottom: 86px; }
  #btnRight  { left: 86px;  bottom: 86px; }
  #btnJump   { left: 51px;  bottom: 156px; }
  #btnDown   { left: 51px;  bottom: 16px; }
  #btnKick   { right: 96px;  bottom: 16px; width: 70px; height: 70px; font-size: 18px; }
  #btnOver   { right: 16px;  bottom: 16px; width: 70px; height: 70px; font-size: 13px; }

  @media (pointer: coarse) {
    #touchControls { display: block; }
    #ui { display: none; }
    body { justify-content: flex-start; padding-top: max(70px, env(safe-area-inset-top, 0px) + 56px); }
    #gameCanvas { max-height: 68vh; }
  }
  #startScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,10,0.92); display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #fff;
  }
  #startScreen h1 { font-size: 48px; color: #f90; text-shadow: 0 0 20px #f90, 0 0 40px #f60; margin-bottom: 10px; }
  #startScreen p { font-size: 16px; color: #aaf; margin: 4px 0; }
  #startScreen .controls { margin: 20px 0; background: rgba(255,255,255,0.05); padding: 16px 28px; border-radius: 10px; }
  #startScreen .controls h3 { color: #ff9; margin-bottom: 8px; }
  #startBtn { margin-top: 24px; padding: 12px 40px; font-size: 20px; background: #f60; color: #fff; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 0 20px #f60; transition: transform 0.1s; }
  #startBtn:hover { transform: scale(1.05); }

  #modeSelect, #onlineMenu { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 16px; }
  .mode-btn { padding: 12px 40px; font-size: 18px; background: #46c; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.1s; }
  .mode-btn:hover { transform: scale(1.05); }
  #onlineMenu { background: rgba(255,255,255,0.05); padding: 16px 24px; border-radius: 10px; min-width: 260px; }
  #onlineMenu input { font-size: 20px; text-align: center; letter-spacing: 4px; width: 110px; padding: 6px; border-radius: 6px; border: none; }
  #onlineMenu .row { display: flex; gap: 8px; align-items: center; justify-content: center; }
  #roomCodeDisplay { font-size: 24px; color: #ff0; letter-spacing: 4px; margin-top: 6px; }
  #onlineStatus { color: #afa; font-size: 14px; min-height: 20px; margin-top: 8px; text-align: center; }
  #backBtn { margin-top: 8px; padding: 6px 20px; background: #555; color: #fff; border: none; border-radius: 6px; cursor: pointer; }

  /* ── ガチャ ── */
  #gachaScreen, #collectionScreen {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,5,0.9);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; gap: 18px; padding: 16px; text-align: center;
    overflow-y: auto;
  }
  .gacha-title { font-size: 28px; color: #ff0; text-shadow: 0 0 12px #f80, 0 0 24px #f60; }

  #gachaCloseBtn {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 330;
  }

  .gacha-machine { position: relative; width: clamp(170px, 50vw, 240px); aspect-ratio: 220 / 300; }
  .gacha-lid {
    position: absolute; top: 0; left: 8%; width: 84%; height: 9%;
    background: #e74c3c; border-radius: 14px 14px 0 0;
    box-shadow: 0 3px 0 rgba(0,0,0,0.25) inset;
  }
  .gacha-dome {
    position: absolute; top: 8%; left: 4%; width: 92%; height: 46%;
    background: rgba(190,225,255,0.22);
    border: 5px solid #e74c3c;
    border-radius: 50% 50% 16px 16px / 38% 38% 16px 16px;
    overflow: hidden;
  }
  .gacha-capsule {
    position: absolute; width: 13%; height: 13%; border-radius: 50%;
    background: linear-gradient(to bottom, #fff 50%, var(--c) 50%);
    border: 1px solid rgba(0,0,0,0.25);
    transition: transform 0.12s;
  }
  .gacha-capsule.shake { animation: gachaShake 0.15s infinite; }
  @keyframes gachaShake {
    0%, 100% { transform: translate(0, 0); }
    25%  { transform: translate(-3px, 2px) rotate(-8deg); }
    50%  { transform: translate(3px, -3px) rotate(8deg); }
    75%  { transform: translate(-2px, 3px) rotate(-4deg); }
  }
  .gacha-body {
    position: absolute; top: 52%; left: 0; width: 100%; height: 48%;
    background: linear-gradient(#e74c3c, #c0392b);
    border-radius: 0 0 16px 16px;
  }
  .gacha-slot {
    position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
    width: 36%; height: 9%; background: #7a1f12; border-radius: 4px;
  }
  .gacha-handle {
    position: absolute; top: 30%; left: 50%; transform: translateX(-50%) rotate(0deg);
    width: 38%; height: 38%; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #ddd 70%, #bbb);
    border: 5px solid #ccc;
    transition: transform 1s cubic-bezier(.5, 1.8, .4, 1);
  }
  .gacha-handle::after {
    content: ''; position: absolute; top: 50%; left: 50%; width: 70%; height: 14%;
    background: #999; border-radius: 4px; transform: translate(-50%, -50%);
  }
  .gacha-handle.spin { transform: translateX(-50%) rotate(360deg); }
  .gacha-exit {
    position: absolute; bottom: 6%; left: 8%; width: 34%; height: 26%;
    background: #7a1f12; border-radius: 6px 6px 14px 14px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.3) inset;
  }

  .gacha-output { position: relative; width: 80px; height: 80px; overflow: visible; }
  .gacha-output-capsule {
    position: absolute; left: 50%; top: -140px;
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(to bottom, #fff 50%, var(--c) 50%);
    border: 2px solid rgba(0,0,0,0.3);
    transform: translateX(-50%) scale(1);
    opacity: 0;
    transition: top 0.6s cubic-bezier(.5,0,.7,1.4), opacity 0.2s, transform 0.6s ease-out;
  }
  .gacha-output-capsule.drop { top: 0; opacity: 1; }
  .gacha-output-capsule.zoom { transform: translateX(-50%) scale(6); }

  .gacha-output-img {
    position: absolute; left: 50%; top: -140px;
    width: 80px; height: 80px; object-fit: cover; border-radius: 10px;
    border: 3px solid #ff0; box-shadow: 0 0 16px #f80;
    transform: translateX(-50%) scale(1);
    opacity: 0;
    transition: top 0.6s cubic-bezier(.5,0,.7,1.4), opacity 0.2s, transform 0.6s ease-out;
  }
  .gacha-output-img.drop { top: 0; opacity: 1; }
  .gacha-output-img.zoom { transform: translateX(-50%) scale(4); }

  .gacha-btn-row { display: flex; gap: 10px; }

  .gacha-result-card {
    display: none; flex-direction: column; align-items: center; gap: 6px;
    max-width: 280px;
    background: rgba(0,0,0,0.65); border-radius: 10px; padding: 10px 18px;
  }
  .gacha-result-name { font-size: 20px; font-weight: bold; color: #ff0; }
  .gacha-result-quote { font-size: 13px; color: #ccc; }

  .collection-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    max-width: 360px;
  }
  .collection-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.06); border-radius: 10px; padding: 10px;
  }
  .collection-capsule {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(to bottom, #fff 50%, var(--c) 50%);
    border: 2px solid rgba(0,0,0,0.3);
  }
  .collection-item.locked .collection-capsule {
    background: #444; border-color: #222;
  }
  .collection-count { font-size: 13px; color: #ddd; }
  .collection-capsule-img {
    width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
    border: 2px solid #ff0;
  }
  .collection-name { font-size: 11px; color: #ff0; }
  .collection-item.clickable { cursor: pointer; }

  #loginRow { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 10px; }
  #loginStatus { font-size: 12px; color: #afa; min-height: 16px; }

  #collectionDetail {
    position: fixed; inset: 0; z-index: 310;
    background: rgba(0,0,5,0.85);
    display: none; align-items: center; justify-content: center;
    padding: 16px;
  }
  .collection-detail-card {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    max-width: 280px; background: rgba(255,255,255,0.06);
    border-radius: 14px; padding: 20px; text-align: center;
  }
  .collection-detail-img {
    width: 120px; height: 120px; object-fit: cover; border-radius: 12px;
    border: 3px solid #ff0; box-shadow: 0 0 16px #f80;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
<div id="ui">← → 移動 | スペース/↑ ジャンプ | Z キック | X オーバーヘッドキック</div>
<canvas id="gameCanvas" width="800" height="480"></canvas>

<div id="startScreen">
  <h1>セパタクロー</h1>
  <div class="controls">
    <h3>操作方法</h3>
    <p>← → ：移動</p>
    <p>スペース / ↑ ：ジャンプ</p>
    <p>Z ：通常キック（足元のボールを蹴る）</p>
    <p>X ：オーバーヘッドキック（ジャンプ中に頭上から蹴り下ろす）</p>
  </div>
  <p style="color:#8f8">先に5点取ったほうが勝ち！</p>

  <div id="modeSelect">
    <button class="mode-btn" id="cpuBtn">CPU対戦</button>
    <button class="mode-btn" id="onlineModeBtn">通信対戦</button>
    <button class="mode-btn" id="collectionBtn">コレクション</button>
  </div>

  <div id="loginRow">
    <button class="mode-btn" id="googleLoginBtn">Googleでログイン</button>
    <div id="loginStatus"></div>
  </div>

  <div id="onlineMenu" style="display:none;">
    <button class="mode-btn" id="createRoomBtn">部屋を作る（4桁ID発行）</button>
    <div id="roomCodeDisplay"></div>
    <div class="row">
      <input id="joinRoomInput" maxlength="4" inputmode="numeric" placeholder="4桁ID">
      <button class="mode-btn" id="joinRoomBtn">部屋に入る</button>
    </div>
    <div id="onlineStatus"></div>
    <button id="backBtn">戻る</button>
  </div>
</div>

<!-- ── 勝利ガチャ ── -->
<div id="gachaScreen">
  <button class="mode-btn" id="gachaCloseBtn" style="display:none;">タイトルへ戻る</button>
  <h2 class="gacha-title">勝利ボーナスガチャ！</h2>
  <div class="gacha-machine">
    <div class="gacha-lid"></div>
    <div class="gacha-dome">
      <div class="gacha-capsule" style="--c:#e74c3c; left:8%;  top:10%;"></div>
      <div class="gacha-capsule" style="--c:#3498db; left:34%; top:4%;"></div>
      <div class="gacha-capsule" style="--c:#2ecc71; left:58%; top:14%;"></div>
      <div class="gacha-capsule" style="--c:#f1c40f; left:78%; top:6%;"></div>
      <div class="gacha-capsule" style="--c:#9b59b6; left:18%; top:38%;"></div>
      <div class="gacha-capsule" style="--c:#ecf0f1; left:46%; top:42%;"></div>
      <div class="gacha-capsule" style="--c:#e74c3c; left:70%; top:36%;"></div>
      <div class="gacha-capsule" style="--c:#3498db; left:4%;  top:64%;"></div>
      <div class="gacha-capsule" style="--c:#f1c40f; left:30%; top:66%;"></div>
      <div class="gacha-capsule" style="--c:#2ecc71; left:56%; top:62%;"></div>
      <div class="gacha-capsule" style="--c:#9b59b6; left:80%; top:64%;"></div>
    </div>
    <div class="gacha-body">
      <div class="gacha-slot"></div>
      <div class="gacha-handle" id="gachaHandle"></div>
      <div class="gacha-exit"></div>
    </div>
  </div>
  <div class="gacha-output" id="gachaOutput"></div>
  <div class="gacha-result-card" id="gachaResultCard"></div>
  <div class="gacha-btn-row">
    <button class="mode-btn" id="gachaPullBtn">ハンドルを回す！</button>
  </div>
</div>

<!-- ── コレクション ── -->
<div id="collectionScreen">
  <h2 class="gacha-title">コレクション</h2>
  <div class="collection-grid" id="collectionGrid"></div>
  <button class="mode-btn" id="collectionBackBtn">戻る</button>
</div>

<!-- ── コレクション詳細 ── -->
<div id="collectionDetail">
  <div class="collection-detail-card"></div>
</div>

<div id="touchControls">
  <div class="touch-btn" id="btnLeft">◀</div>
  <div class="touch-btn" id="btnRight">▶</div>
  <div class="touch-btn" id="btnDown">▼</div>
  <div class="touch-btn" id="btnJump">▲</div>
  <div class="touch-btn" id="btnKick">Z<br>キック</div>
  <div class="touch-btn" id="btnOver">X<br>アタック</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── サウンド ──────────────────────────────────────
let audioCtx = null;
function playAttackSound() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.18);
}


// ── 定数 ──────────────────────────────────────────
const GRAVITY = 0.45;
const SPEED_SCALE = 0.2; // 全体のゲームスピード（1 = 通常、0.2 = 5倍ゆっくり）
// ボールの物理更新を1フレーム内で複数回実行し、軌道・重力の比率を保ったまま
// 見た目のスピードだけを3倍にする（BALL_SUBSTEPS × BALL_STEP_SCALE = SPEED_SCALE * 3）
const BALL_SUBSTEPS = 4;
const BALL_STEP_SCALE = SPEED_SCALE * 0.75;
const GROUND = H - 60;
const NET_X = W / 2;
const NET_H = 100;
const NET_TOP = GROUND - NET_H;
const PLAYER_W = 28, PLAYER_H = 52;
const BALL_R = 14;
const WIN_SCORE = 5;

// ── Firebase設定 ──────────────────────────────────
// ★ 自分のFirebaseプロジェクトの設定値に書き換えてください
// (Firebaseコンソール → プロジェクトの設定 → 全般 → マイアプリ → SDKの構成)
const firebaseConfig = {
  apiKey: "AIzaSyCEqJiiOeqJvsXacsUlxybGg0zrXpM6Hfg",
  authDomain: "sepak-game.firebaseapp.com",
  databaseURL: "https://sepak-game-default-rtdb.firebaseio.com",
  projectId: "sepak-game",
  storageBucket: "sepak-game.firebasestorage.app",
  messagingSenderId: "556598796613",
  appId: "1:556598796613:web:7057bae47a4af72fb95e2c",
  measurementId: "G-7VQ87H3LGP"
};
let db = null;
let auth = null;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  auth = firebase.auth();
} catch (e) {
  console.warn('Firebase未設定: 通信対戦は利用できません', e);
}

// ── 状態 ──────────────────────────────────────────
let keys = {};
let score = { p: 0, cpu: 0 };
let effects = [];
let gameState = 'start'; // start / play / point / gameover
let pointMsg = '';
let pointTimer = 0;
let stars = [];

// ── ガチャ ────────────────────────────────────────
const CAPSULE_TYPES = [
  {
    id: 'tsubo_kura', color: '#f1c40f', weight: 80,
    name: 'ツボ・クラ',
    quote: '＜一言＞野球とセパの二刀流なんてこいつとあいつくらい',
    image: 'assets/tsubo_kura.png',
  },
  {
    id: 'kato_k', color: '#3498db', weight: 20,
    name: 'カト・K',
    quote: '＜一言＞なんか逆さまになりたくなっちゃうんだよな～',
    image: 'assets/kato_k.png',
  },
];
let gachaShown = false;

function pickCapsule() {
  const total = CAPSULE_TYPES.reduce((sum, t) => sum + t.weight, 0);
  let r = Math.random() * total;
  for (const t of CAPSULE_TYPES) {
    if (r < t.weight) return t;
    r -= t.weight;
  }
  return CAPSULE_TYPES[CAPSULE_TYPES.length - 1];
}

function loadCollection() {
  try {
    return JSON.parse(localStorage.getItem('sepak_gacha_collection')) || {};
  } catch (e) {
    return {};
  }
}
function saveCollection(collection) {
  localStorage.setItem('sepak_gacha_collection', JSON.stringify(collection));
  if (currentUser && db) {
    db.ref('users/' + currentUser.uid + '/collection').set(collection);
  }
}

// ── ログイン（コレクションのクラウド保存） ──────────
let currentUser = null;

function mergeCollections(a, b) {
  const merged = Object.assign({}, a);
  for (const id in b) {
    merged[id] = Math.max(merged[id] || 0, b[id] || 0);
  }
  return merged;
}

function updateLoginUI() {
  const btn = document.getElementById('googleLoginBtn');
  const status = document.getElementById('loginStatus');
  if (currentUser) {
    btn.textContent = 'ログアウト';
    status.textContent = (currentUser.displayName || 'ユーザー') + ' でログイン中';
  } else {
    btn.textContent = 'Googleでログイン';
    status.textContent = '';
  }
}

if (auth) {
  auth.onAuthStateChanged(user => {
    currentUser = user;
    updateLoginUI();
    if (user && db) {
      db.ref('users/' + user.uid + '/collection').get().then(snap => {
        const cloud = snap.val() || {};
        const merged = mergeCollections(loadCollection(), cloud);
        saveCollection(merged);
        if (document.getElementById('collectionScreen').style.display !== 'none') {
          renderCollection();
        }
      }).catch(e => console.warn('コレクション読み込み失敗', e));
    }
  });
}

document.getElementById('googleLoginBtn').addEventListener('click', () => {
  if (!auth) return;
  if (currentUser) {
    auth.signOut();
  } else {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => {
      document.getElementById('loginStatus').textContent = 'ログイン失敗: ' + e.message;
    });
  }
});

// ── 通信対戦 ──────────────────────────────────────
let mode = 'cpu'; // 'cpu' | 'host' | 'guest'
let serveSide = 1; // 1: 自分側からスタート, -1: 相手側からスタート（得点ごとに交互）
let roomRef = null;
let remoteInput = { left:false, right:false, jump:false, down:false, kick:false, overhead:false };
let remoteHostState = null;
let netTimer = 0;

// ── 星 ────────────────────────────────────────────
for (let i = 0; i < 120; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * (H * 0.6), r: Math.random() * 1.5 + 0.3, b: Math.random() });
}

// ── エンティティ ──────────────────────────────────
function makePlayer(x, isPlayer) {
  return {
    x, y: GROUND, vx: 0, vy: 0,
    onGround: true,
    isPlayer,
    facing: isPlayer ? 1 : -1,
    kickCooldown: 0,
    overheadState: 0, // 0=none 1=rising 2=strike
    overheadTimer: 0,
    kickEffect: 0,
    width: PLAYER_W, height: PLAYER_H,
    color: isPlayer ? '#4af' : '#f64',
    limbAnim: 0,
    jumpCount: 0,
    prevJump: false,
  };
}

function makeBall() {
  return {
    x: serveSide === 1 ? W / 4 : W * 3 / 4, y: GROUND - 200,
    vx: 2 * serveSide, vy: -3,
    spin: 0, trail: [],
  };
}

let player, cpu, ball;

function resetEntities() {
  player = makePlayer(W * 0.25, true);
  cpu    = makePlayer(W * 0.75, false);
  ball   = makeBall();
}

// ── 入力 ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function localInput() {
  return {
    left: !!keys['ArrowLeft'],
    right: !!keys['ArrowRight'],
    jump: !!(keys['Space'] || keys['ArrowUp']),
    down: !!keys['ArrowDown'],
    kick: !!keys['KeyZ'],
    overhead: !!keys['KeyX'],
  };
}

// ── タッチ操作 ────────────────────────────────────
function bindTouchButton(id, code) {
  const el = document.getElementById(id);
  const press = e => { e.preventDefault(); keys[code] = true; el.classList.add('active'); };
  const release = e => { e.preventDefault(); keys[code] = false; el.classList.remove('active'); };
  el.addEventListener('touchstart', press, { passive: false });
  el.addEventListener('touchend', release, { passive: false });
  el.addEventListener('touchcancel', release, { passive: false });
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
}
bindTouchButton('btnLeft', 'ArrowLeft');
bindTouchButton('btnRight', 'ArrowRight');
bindTouchButton('btnDown', 'ArrowDown');
bindTouchButton('btnJump', 'Space');
bindTouchButton('btnKick', 'KeyZ');
bindTouchButton('btnOver', 'KeyX');

// ── CPU AI ────────────────────────────────────────
function cpuAI() {
  if (gameState !== 'play') return;
  const spd = 10.8;
  // 自陣側に来たボールを常に追いかける
  const minX = NET_X + 10;
  const maxX = W - 10;
  const targetX = Math.max(minX, Math.min(maxX, ball.x));

  if (cpu.x < targetX - 5) cpu.vx = spd;
  else if (cpu.x > targetX + 5) cpu.vx = -spd;
  else cpu.vx = 0;

  // ジャンプ判断（ネット付近、もしくは遠くてもボールが高い位置のときに早めに跳ぶ）
  const nearNet = cpu.x < NET_X + 160;
  const ballHigh = ball.y < GROUND - 70;
  const canAttack = nearNet || ballHigh;
  if (ball.x > NET_X - 30 && canAttack && cpu.onGround) {
    if (Math.abs(cpu.x - ball.x) < 140) {
      cpu.vy = -11;
      cpu.onGround = false;
    }
  }

  // キック判断（範囲を広めに）
  if (cpu.kickCooldown <= 0) {
    const dx = Math.abs(cpu.x - ball.x);
    const dy = Math.abs(cpu.y - ball.y);
    // オーバーヘッドアタックはネット付近、もしくは遠くてもボールが高い位置のときのみ
    if (!cpu.onGround && dy < 60 && dx < 70 && canAttack) {
      doOverhead(cpu);
    } else if (dx < 65 && dy < 65) {
      doKick(cpu);
    }
  }
}

// ── キック処理 ────────────────────────────────────
function doKick(ent) {
  if (ent.kickCooldown > 0) return;
  const dx = ball.x - ent.x;
  const dy = ball.y - ent.y;
  if (Math.abs(dx) < 60 && Math.abs(dy) < 80) {
    const spd = (ent.isPlayer ? 13 : 11) * 1.3;
    const dir = Math.abs(dx) < 5 ? ent.facing : (dx > 0 ? 1 : -1);
    ball.vx = dir * spd * 0.7 + (ent.isPlayer ? 0.5 : -0.5);
    ball.vy = -spd * 0.85;
    ball.spin = dir > 0 ? 6 : -6;
    ent.kickCooldown = 20;
    ent.kickEffect = 10;
    addEffect(ball.x, ball.y, '#ff0', 'kick');
    playAttackSound();
  }
}

function doOverhead(ent) {
  if (ent.kickCooldown > 0) return;
  const dx = ball.x - ent.x;
  const dy = ball.y - ent.y;
  if (Math.abs(dx) < 70 && Math.abs(dy) < 80) {
    ball.vx = (ent.isPlayer ? 1 : -1) * 14 * 1.3;
    ball.vy = 6 * 1.3;  // 相手コートに飛ぶ角度
    ball.spin = ent.isPlayer ? -8 : 8;
    ent.kickCooldown = 25;
    ent.overheadState = 2;
    ent.overheadTimer = 18;
    ent.kickEffect = 14;
    addEffect(ball.x, ball.y, '#f0f', 'overhead');
    playAttackSound();
  }
}

// ── エフェクト ────────────────────────────────────
function addEffect(x, y, color, type) {
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 / 10) * i;
    effects.push({
      x, y,
      vx: Math.cos(angle) * (type === 'overhead' ? 4 : 3),
      vy: Math.sin(angle) * (type === 'overhead' ? 4 : 3),
      life: 18, maxLife: 18,
      color, r: type === 'overhead' ? 5 : 4,
    });
  }
}

// ── 物理 ──────────────────────────────────────────
function updateBall(authoritative) {
  ball.vy += GRAVITY * BALL_STEP_SCALE;
  ball.spin *= 0.97;
  ball.vx *= 0.995;

  // トレイル
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 12) ball.trail.shift();

  ball.x += ball.vx * BALL_STEP_SCALE;
  ball.y += ball.vy * BALL_STEP_SCALE;

  // 地面
  if (ball.y + BALL_R >= GROUND) {
    ball.y = GROUND - BALL_R;
    ball.vy *= -0.55;
    ball.vx *= 0.85;
    ball.spin *= 0.7;
    if (Math.abs(ball.vy) < 1.5) ball.vy = 0;
  }

  // 壁
  if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx) * 0.8; }
  if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx) * 0.8; }

  // ネット
  const netLeft  = NET_X - 4;
  const netRight = NET_X + 4;
  if (ball.x + BALL_R > netLeft && ball.x - BALL_R < netRight && ball.y + BALL_R > NET_TOP) {
    if (ball.vx > 0 && ball.x < NET_X) { ball.x = netLeft - BALL_R; ball.vx *= -0.6; }
    else if (ball.vx < 0 && ball.x > NET_X) { ball.x = netRight + BALL_R; ball.vx *= -0.6; }
    else { ball.vy *= -0.6; ball.y = NET_TOP - BALL_R; }
  }

  // 得点判定（ホスト/シングルプレイのみ判定する）
  if (authoritative && ball.y + BALL_R >= GROUND && gameState === 'play') {
    if (ball.x < NET_X) {
      score.cpu++;
      showPoint('CPUの得点！', score.cpu >= WIN_SCORE ? 'gameover' : 'point');
    } else {
      score.p++;
      showPoint('プレイヤーの得点！', score.p >= WIN_SCORE ? 'gameover' : 'point');
    }
  }
}

// ボールの物理更新を1フレーム内でBALL_SUBSTEPS回連続実行する
function updateBallSubsteps(authoritative) {
  for (let i = 0; i < BALL_SUBSTEPS; i++) {
    updateBall(authoritative);
    if (authoritative && gameState !== 'play') break;
  }
}

function updatePlayer(ent, input) {
  // 横移動
  ent.vy += GRAVITY * SPEED_SCALE;

  if (input) {
    if (input.left)  { ent.vx = -13.5 * 1.3; ent.facing = -1; }
    else if (input.right) { ent.vx = 13.5 * 1.3; ent.facing = 1; }
    else ent.vx *= 0.7;

    // ジャンプ（2回まで連続ジャンプ可能）
    if (input.jump && !ent.prevJump) {
      if (ent.onGround) {
        ent.vy = -11.5 * 1.3; ent.onGround = false; ent.jumpCount = 1;
      } else if (ent.jumpCount < 2) {
        ent.vy = -11.5 * 1.3; ent.jumpCount = 2;
      }
    }
    ent.prevJump = input.jump;

    if (input.down && !ent.onGround) {
      ent.vy = 18 * 1.3; // 急降下（上昇中でも即下降）
    }
    if (input.kick && ent.kickCooldown <= 0) doKick(ent);
    if (input.overhead && ent.kickCooldown <= 0) doOverhead(ent);
  } else {
    cpuAI();
  }

  // 壁制限
  const half = ent.isPlayer ? NET_X - 10 : W;
  const leftWall = ent.isPlayer ? 10 : NET_X + 10;

  ent.x += ent.vx * SPEED_SCALE;
  ent.y += ent.vy * SPEED_SCALE;

  if (ent.x < leftWall) { ent.x = leftWall; ent.vx = 0; }
  if (ent.x > half) { ent.x = half; ent.vx = 0; }

  if (ent.y >= GROUND) {
    ent.y = GROUND; ent.vy = 0; ent.onGround = true;
    ent.overheadState = 0; ent.jumpCount = 0;
  }

  if (ent.kickCooldown > 0) ent.kickCooldown--;
  if (ent.kickEffect > 0) ent.kickEffect--;
  if (ent.overheadTimer > 0) { ent.overheadTimer--; if (ent.overheadTimer === 0) ent.overheadState = 0; }
  ent.limbAnim += (ent.onGround ? Math.abs(ent.vx) * 0.15 : 0.08) * SPEED_SCALE;
}

// ── 得点イベント ───────────────────────────────────
function showPoint(msg, next) {
  pointMsg = msg;
  pointTimer = next === 'gameover' ? 180 : 90;
  gameState = next === 'gameover' ? 'gameover' : 'point';
}

function resetAfterPoint() {
  serveSide = -serveSide;
  player.x = W * 0.25; player.y = GROUND; player.vx = 0; player.vy = 0; player.onGround = true;
  cpu.x = W * 0.75; cpu.y = GROUND; cpu.vx = 0; cpu.vy = 0; cpu.onGround = true;
  ball.x = serveSide === 1 ? W / 4 : W * 3 / 4; ball.y = GROUND - 240;
  ball.vx = 2 * serveSide; ball.vy = -4; ball.spin = 0; ball.trail = [];
  effects = [];
  gameState = 'play';
}

// ── 描画：背景 ────────────────────────────────────
function drawBackground() {
  // 空のグラデーション
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#050518');
  sky.addColorStop(0.7, '#0d1a3a');
  sky.addColorStop(1, '#1a2a4a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 星
  stars.forEach(s => {
    const twinkle = 0.5 + 0.5 * Math.sin(Date.now() * 0.001 + s.b * 10);
    ctx.fillStyle = `rgba(255,255,255,${0.4 + twinkle * 0.6})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // 月
  ctx.save();
  ctx.fillStyle = '#ffe8a0';
  ctx.shadowColor = '#ffe060';
  ctx.shadowBlur = 30;
  ctx.beginPath(); ctx.arc(700, 50, 28, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0d1a3a';
  ctx.beginPath(); ctx.arc(712, 44, 24, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // コートの地面
  const grd = ctx.createLinearGradient(0, GROUND, 0, H);
  grd.addColorStop(0, '#1a3a1a');
  grd.addColorStop(1, '#0a1e0a');
  ctx.fillStyle = grd;
  ctx.fillRect(0, GROUND, W, H - GROUND);

  // コートライン
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(NET_X, GROUND); ctx.lineTo(NET_X, GROUND + 10); ctx.stroke();

  // ライン（左右エリア）
  [80, W - 80, W * 0.25, W * 0.75].forEach(lx => {
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.beginPath(); ctx.moveTo(lx, GROUND); ctx.lineTo(lx, H); ctx.stroke();
  });

  // コートライト（照明雰囲気）
  [[160, GROUND - 5], [640, GROUND - 5]].forEach(([lx, ly]) => {
    const glow = ctx.createRadialGradient(lx, ly, 0, lx, ly, 180);
    glow.addColorStop(0, 'rgba(200,230,255,0.07)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
  });
}

// ── 描画：ネット ──────────────────────────────────
function drawNet() {
  ctx.save();
  // ポール
  ctx.fillStyle = '#aaa';
  ctx.fillRect(NET_X - 3, NET_TOP - 8, 6, NET_H + 8);

  // ネット本体
  ctx.strokeStyle = 'rgba(200,200,255,0.7)';
  ctx.lineWidth = 1;
  const cols = 12;
  for (let i = 0; i <= cols; i++) {
    const nx = NET_X - 3 + (6 / cols) * i;
    ctx.beginPath(); ctx.moveTo(nx, NET_TOP); ctx.lineTo(nx, GROUND); ctx.stroke();
  }
  const rows = 8;
  for (let j = 0; j <= rows; j++) {
    const ny = NET_TOP + (NET_H / rows) * j;
    ctx.beginPath(); ctx.moveTo(NET_X - 3, ny); ctx.lineTo(NET_X + 3, ny); ctx.stroke();
  }
  // テープ
  ctx.fillStyle = '#fff';
  ctx.fillRect(NET_X - 4, NET_TOP - 6, 8, 7);
  ctx.restore();
}

// ── 描画：プレイヤー ──────────────────────────────
function drawPlayer(ent) {
  ctx.save();
  ctx.translate(ent.x, ent.y);

  const isOverhead = ent.overheadState === 2;
  const scale = ent.facing;

  ctx.scale(scale, 1);

  // オーバーヘッド時は体を逆転
  if (isOverhead) {
    ctx.save();
    ctx.rotate(Math.PI);
    ctx.translate(0, -PLAYER_H);
  }

  const legSwing = ent.onGround ? Math.sin(ent.limbAnim) * 18 : 0;
  const armSwing = ent.onGround ? Math.sin(ent.limbAnim + Math.PI) * 14 : 0;
  const kickBonus = ent.kickEffect > 0 ? 30 : 0;

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // 脚
  const legColor = ent.isPlayer ? '#1a6acc' : '#aa2200';
  ctx.strokeStyle = legColor;
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';

  // 左脚
  ctx.save();
  ctx.rotate((-legSwing - kickBonus) * Math.PI / 180);
  ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(0, -50); ctx.stroke();
  ctx.restore();
  // 右脚
  ctx.save();
  ctx.rotate((legSwing + kickBonus * 0.3) * Math.PI / 180);
  ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(0, -50); ctx.stroke();
  ctx.restore();

  // 胴体
  ctx.fillStyle = ent.isPlayer ? '#2a7aee' : '#cc3300';
  ctx.beginPath();
  ctx.roundRect(-10, -PLAYER_H + 8, 20, 28, 4);
  ctx.fill();

  // 腕
  ctx.strokeStyle = ent.isPlayer ? '#1a5aaa' : '#882200';
  ctx.lineWidth = 5;
  ctx.save();
  ctx.rotate((armSwing - 10) * Math.PI / 180);
  ctx.beginPath(); ctx.moveTo(-10, -PLAYER_H + 14); ctx.lineTo(-20, -PLAYER_H + 32); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.rotate((-armSwing + 10) * Math.PI / 180);
  ctx.beginPath(); ctx.moveTo(10, -PLAYER_H + 14); ctx.lineTo(20, -PLAYER_H + 32); ctx.stroke();
  ctx.restore();

  // 頭
  const headColor = ent.isPlayer ? '#fdd' : '#fcc';
  ctx.fillStyle = headColor;
  ctx.beginPath();
  ctx.arc(0, -PLAYER_H + 4, 12, 0, Math.PI * 2);
  ctx.fill();

  // 目
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(5, -PLAYER_H + 2, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(6, -PLAYER_H + 1, 1, 0, Math.PI * 2); ctx.fill();

  if (isOverhead) ctx.restore();
  ctx.restore();
}

// ── 描画：ボール ──────────────────────────────────
function drawBall() {
  // トレイル
  ball.trail.forEach((t, i) => {
    const alpha = (i / ball.trail.length) * 0.4;
    const r = BALL_R * (i / ball.trail.length) * 0.8;
    ctx.fillStyle = `rgba(255,180,50,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fill();
  });

  // ボール本体
  ctx.save();
  ctx.translate(ball.x, ball.y);
  ctx.rotate(ball.spin * 0.1);

  const ballGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, BALL_R);
  ballGrad.addColorStop(0, '#fff8e0');
  ballGrad.addColorStop(0.4, '#f8d040');
  ballGrad.addColorStop(1, '#c87000');
  ctx.fillStyle = ballGrad;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI * 2); ctx.fill();

  // ボール模様（セパタクロー風）
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1.2;
  // 横線
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(0, i * 5, BALL_R, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  // 縦線
  for (let a = 0; a < Math.PI; a += Math.PI / 3) {
    ctx.beginPath();
    ctx.ellipse(0, 0, 4, BALL_R, a, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

// ── 描画：エフェクト ──────────────────────────────
function drawEffects() {
  effects.forEach(e => {
    const a = e.life / e.maxLife;
    ctx.fillStyle = e.color + Math.floor(a * 255).toString(16).padStart(2, '0');
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r * a, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ── 描画：スコア ──────────────────────────────────
function drawScore() {
  ctx.save();
  // スコアボード背景
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.roundRect(W/2 - 90, 10, 180, 44, 8); ctx.fill();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#adf';
  ctx.font = 'bold 13px Arial';
  ctx.fillText('PLAYER', W/2 - 45, 26);
  ctx.fillStyle = '#faa';
  ctx.fillText('CPU', W/2 + 45, 26);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px Arial';
  ctx.fillText(score.p, W/2 - 45, 48);
  ctx.fillText(score.cpu, W/2 + 45, 48);

  ctx.fillStyle = '#888';
  ctx.font = '18px Arial';
  ctx.fillText('-', W/2, 44);
  ctx.restore();
}

// ── 描画：オーバーレイ ────────────────────────────
function drawOverlay() {
  if (gameState === 'point' || gameState === 'gameover') {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    if (gameState === 'gameover') {
      const winner = score.p >= WIN_SCORE ? 'プレイヤー' : 'CPU';
      ctx.font = 'bold 44px Arial';
      ctx.fillStyle = score.p >= WIN_SCORE ? '#4af' : '#f64';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 20;
      ctx.fillText(winner + ' の勝利！', W/2, H/2 - 20);
      ctx.shadowBlur = 0;
      ctx.font = '20px Arial';
      ctx.fillStyle = '#ccc';
      ctx.fillText('スペースキーでリスタート', W/2, H/2 + 24);
    } else {
      ctx.font = 'bold 36px Arial';
      ctx.fillStyle = '#ff0';
      ctx.shadowColor = '#f80';
      ctx.shadowBlur = 16;
      ctx.fillText(pointMsg, W/2, H/2);
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }
}

// ── メインループ ──────────────────────────────────
function updateEffects() {
  effects = effects.filter(e => e.life-- > 0);
  effects.forEach(e => { e.x += e.vx; e.y += e.vy; e.vx *= 0.92; e.vy *= 0.92; });
}

let lastTime = 0;
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawNet();

  if (mode === 'cpu') {
    if (gameState === 'play') {
      updatePlayer(player, localInput());
      updatePlayer(cpu, null);
      updateBallSubsteps(true);
      updateEffects();
    } else if (gameState === 'point') {
      pointTimer--;
      if (pointTimer <= 0) resetAfterPoint();
    } else if (gameState === 'gameover') {
      if (pointTimer <= 0) {
        if (score.p >= WIN_SCORE) {
          if (!gachaShown) {
            gachaShown = true;
            showGachaScreen();
          }
        } else if (keys['Space']) {
          score = { p: 0, cpu: 0 };
          resetEntities();
          gameState = 'play';
        }
      }
      pointTimer = Math.max(0, pointTimer - 1);
    }
  } else if (mode === 'host') {
    if (gameState === 'play') {
      updatePlayer(player, localInput());
      updatePlayer(cpu, remoteInput);
      updateBallSubsteps(true);
      updateEffects();
    } else if (gameState === 'point') {
      pointTimer--;
      if (pointTimer <= 0) resetAfterPoint();
    } else if (gameState === 'gameover') {
      if (localInput().jump && pointTimer <= 0) {
        score = { p: 0, cpu: 0 };
        resetEntities();
        gameState = 'play';
      }
      pointTimer = Math.max(0, pointTimer - 1);
    }
    netTimer++;
    if (roomRef) {
      if (netTimer % 2 === 0) roomRef.child('hostInput').set(localInput());
      if (netTimer % 3 === 0) {
        roomRef.child('hostState').set({
          ball: { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy, spin: ball.spin },
          score, gameState, pointMsg, pointTimer,
          player: {
            x: player.x, y: player.y, facing: player.facing, limbAnim: player.limbAnim,
            onGround: player.onGround, overheadState: player.overheadState, kickEffect: player.kickEffect,
          },
        });
      }
    }
  } else if (mode === 'guest') {
    const wasGameState = gameState;
    if (gameState === 'play') {
      updatePlayer(cpu, localInput());
      updatePlayer(player, remoteInput);
      updateBallSubsteps(false);
      updateEffects();
    }
    netTimer++;
    if (roomRef && netTimer % 2 === 0) roomRef.child('guestInput').set(localInput());

    if (remoteHostState) {
      score = remoteHostState.score;
      gameState = remoteHostState.gameState;
      pointMsg = remoteHostState.pointMsg;
      pointTimer = remoteHostState.pointTimer;

      ball.vx = remoteHostState.ball.vx; ball.vy = remoteHostState.ball.vy;
      ball.spin = remoteHostState.ball.spin;
      // 位置はホストへ滑らかに補正することで、毎フレームのスナップによる
      // 「速すぎる」見え方を防ぐ
      ball.x += (remoteHostState.ball.x - ball.x) * 0.3;
      ball.y += (remoteHostState.ball.y - ball.y) * 0.3;

      player.x = remoteHostState.player.x; player.y = remoteHostState.player.y;
      player.facing = remoteHostState.player.facing;
      player.limbAnim = remoteHostState.player.limbAnim;
      player.onGround = remoteHostState.player.onGround;
      player.overheadState = remoteHostState.player.overheadState;
      player.kickEffect = remoteHostState.player.kickEffect;

      if (wasGameState !== 'play' && gameState === 'play') {
        // ホストが得点後にリセットしたのでゲスト側の自キャラもリセット
        cpu.x = W * 0.75; cpu.y = GROUND; cpu.vx = 0; cpu.vy = 0; cpu.onGround = true;
        ball.x = remoteHostState.ball.x; ball.y = remoteHostState.ball.y;
        ball.trail = [];
        effects = [];
      }
    }
  }

  drawEffects();
  drawBall();
  drawPlayer(player);
  drawPlayer(cpu);
  drawScore();
  drawOverlay();
}

// ── スタート（CPU対戦） ───────────────────────────
document.getElementById('cpuBtn').addEventListener('click', () => {
  document.getElementById('startScreen').style.display = 'none';
  mode = 'cpu';
  score = { p: 0, cpu: 0 };
  gachaShown = false;
  resetEntities();
  gameState = 'play';
  requestAnimationFrame(gameLoop);
});

// ── 通信対戦メニュー ──────────────────────────────
document.getElementById('onlineModeBtn').addEventListener('click', () => {
  if (!db) {
    alert('通信対戦はFirebaseの設定が必要です。');
    return;
  }
  document.getElementById('modeSelect').style.display = 'none';
  document.getElementById('onlineMenu').style.display = 'flex';
});

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('onlineMenu').style.display = 'none';
  document.getElementById('modeSelect').style.display = 'flex';
  document.getElementById('onlineStatus').textContent = '';
  document.getElementById('roomCodeDisplay').textContent = '';
});

document.getElementById('createRoomBtn').addEventListener('click', () => {
  const roomId = String(Math.floor(1000 + Math.random() * 9000));
  roomRef = db.ref('rooms/' + roomId);
  roomRef.set({ createdAt: Date.now(), guestJoined: false });
  roomRef.onDisconnect().remove();

  document.getElementById('roomCodeDisplay').textContent = 'ルームID: ' + roomId;
  document.getElementById('onlineStatus').textContent = '相手の参加を待っています...';
  mode = 'host';

  roomRef.child('guestJoined').on('value', snap => {
    if (snap.val() === true) {
      roomRef.child('guestJoined').off();
      startOnlineGame();
    }
  });
});

document.getElementById('joinRoomBtn').addEventListener('click', () => {
  const id = document.getElementById('joinRoomInput').value.trim();
  if (!/^\d{4}$/.test(id)) {
    document.getElementById('onlineStatus').textContent = '4桁の数字を入力してください';
    return;
  }
  const ref = db.ref('rooms/' + id);
  ref.once('value', snap => {
    if (!snap.exists()) {
      document.getElementById('onlineStatus').textContent = 'その部屋は見つかりません';
      return;
    }
    roomRef = ref;
    mode = 'guest';
    roomRef.update({ guestJoined: true });
    startOnlineGame();
  });
});

function startOnlineGame() {
  document.getElementById('startScreen').style.display = 'none';
  resetEntities();
  gameState = 'play';

  if (mode === 'host') {
    roomRef.child('guestInput').on('value', snap => {
      remoteInput = snap.val() || remoteInput;
    });
  } else {
    roomRef.child('hostInput').on('value', snap => {
      remoteInput = snap.val() || remoteInput;
    });
    roomRef.child('hostState').on('value', snap => {
      remoteHostState = snap.val();
    });
  }

  requestAnimationFrame(gameLoop);
}

// ── ガチャ画面 ────────────────────────────────────
function showGachaScreen() {
  const output = document.getElementById('gachaOutput');
  output.innerHTML = '';
  document.getElementById('gachaHandle').classList.remove('spin');
  document.querySelectorAll('.gacha-capsule').forEach(c => c.classList.remove('shake'));

  const resultCard = document.getElementById('gachaResultCard');
  resultCard.style.display = 'none';
  resultCard.innerHTML = '';

  const pullBtn = document.getElementById('gachaPullBtn');
  pullBtn.style.display = '';
  pullBtn.disabled = false;
  document.getElementById('gachaCloseBtn').style.display = 'none';

  document.getElementById('gachaScreen').style.display = 'flex';
}

document.getElementById('gachaPullBtn').addEventListener('click', () => {
  const pullBtn = document.getElementById('gachaPullBtn');
  pullBtn.disabled = true;

  // ハンドルが回転し、カプセルがガシャガシャ揺れる
  document.getElementById('gachaHandle').classList.add('spin');
  document.querySelectorAll('.gacha-capsule').forEach(c => c.classList.add('shake'));

  setTimeout(() => {
    document.querySelectorAll('.gacha-capsule').forEach(c => c.classList.remove('shake'));

    // カプセルが出口からコロンと落ちてくる
    const result = pickCapsule();
    const collection = loadCollection();
    collection[result.id] = (collection[result.id] || 0) + 1;
    saveCollection(collection);

    const output = document.getElementById('gachaOutput');
    output.innerHTML = '';
    let piece;
    if (result.image) {
      piece = document.createElement('img');
      piece.src = result.image;
      piece.alt = result.name || '';
      piece.className = 'gacha-output-img';
    } else {
      piece = document.createElement('div');
      piece.className = 'gacha-output-capsule';
      piece.style.setProperty('--c', result.color);
    }
    output.appendChild(piece);

    requestAnimationFrame(() => piece.classList.add('drop'));

    // 落下後、画面いっぱいにズームアップ
    setTimeout(() => {
      piece.classList.add('zoom');
      setTimeout(() => {
        showGachaResultCard(result);
        document.getElementById('gachaCloseBtn').style.display = '';
        pullBtn.style.display = 'none';
      }, 700);
    }, 700);
  }, 1000);
});

function showGachaResultCard(result) {
  const card = document.getElementById('gachaResultCard');
  if (result.name) {
    card.innerHTML =
      `<div class="gacha-result-name">${result.name}</div>` +
      (result.quote ? `<div class="gacha-result-quote">${result.quote}</div>` : '');
  } else {
    card.innerHTML = '';
  }
  card.style.display = 'flex';
}


document.getElementById('gachaCloseBtn').addEventListener('click', () => {
  document.getElementById('gachaScreen').style.display = 'none';
  gachaShown = false;
  score = { p: 0, cpu: 0 };
  gameState = 'start';
  document.getElementById('startScreen').style.display = 'flex';
});

// ── コレクション画面 ──────────────────────────────
function renderCollection() {
  const collection = loadCollection();
  const grid = document.getElementById('collectionGrid');
  grid.innerHTML = '';
  CAPSULE_TYPES.forEach(t => {
    const count = collection[t.id] || 0;
    const item = document.createElement('div');
    item.className = 'collection-item' + (count > 0 ? '' : ' locked');
    const visual = (t.image && count > 0)
      ? `<img src="${t.image}" alt="${t.name || ''}" class="collection-capsule-img">`
      : `<div class="collection-capsule" style="--c:${t.color}"></div>`;
    const label = count > 0 ? (t.name || '') : '？';
    item.innerHTML =
      visual +
      `<div class="collection-count">${count > 0 ? '×' + count : ''}</div>` +
      (label ? `<div class="collection-name">${label}</div>` : '');

    if (count > 0 && (t.name || t.quote)) {
      item.classList.add('clickable');
      item.addEventListener('click', () => showCollectionDetail(t));
    }

    grid.appendChild(item);
  });
}

function showCollectionDetail(t) {
  const detail = document.getElementById('collectionDetail');
  detail.querySelector('.collection-detail-card').innerHTML =
    (t.image ? `<img src="${t.image}" alt="${t.name || ''}" class="collection-detail-img">` : '') +
    (t.name ? `<div class="gacha-result-name">${t.name}</div>` : '') +
    (t.quote ? `<div class="gacha-result-quote">${t.quote}</div>` : '');
  detail.style.display = 'flex';
}

document.getElementById('collectionDetail').addEventListener('click', () => {
  document.getElementById('collectionDetail').style.display = 'none';
});

document.getElementById('collectionBtn').addEventListener('click', () => {
  renderCollection();
  document.getElementById('collectionScreen').style.display = 'flex';
});

document.getElementById('collectionBackBtn').addEventListener('click', () => {
  document.getElementById('collectionScreen').style.display = 'none';
});
</script>
